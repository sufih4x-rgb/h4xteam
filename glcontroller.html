<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>H4X | Lobby Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f0f4f8; padding: 20px; }
        .admin-card { background: #fff; max-width: 450px; margin: auto; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h2 { color: #4361ee; text-align: center; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #edf2f7; border-radius: 12px; box-sizing: border-box; }
        #preview { width: 100%; height: 150px; border-radius: 15px; object-fit: cover; display: none; margin-bottom: 15px; border: 2px dashed #4361ee; }
        .btn { width: 100%; padding: 15px; background: #4361ee; color: #fff; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; }
        .game-list { margin-top: 30px; max-width: 450px; margin-left: auto; margin-right: auto; }
        .item { display: flex; align-items: center; background: #fff; padding: 10px; border-radius: 12px; margin-bottom: 8px; border: 1px solid #eee; }
        .item img { width: 45px; height: 45px; border-radius: 8px; margin-right: 12px; }
        .item-name { flex: 1; font-weight: 700; font-size: 14px; }
        .del { color: #ff4757; cursor: pointer; font-weight: 800; font-size: 12px; padding: 5px; }
    </style>
</head>
<body>

<div class="admin-card">
    <h2>🚀 Add Game</h2>
    <img id="preview" src="">
    <label style="font-size:12px; font-weight:800; color:#64748b;">GAME POSTER</label>
    <input type="file" id="imgInput" accept="image/*" onchange="encodeImg()">
    <input type="text" id="gName" placeholder="Game Name">
    <input type="text" id="gLink" placeholder="File Link (e.g. aviator.html)">
    <input type="text" id="gTag" placeholder="Tag (e.g. 2x Win)">
    <input type="text" id="gBadge" placeholder="Badge (HOT)">
    <button class="btn" id="saveBtn" onclick="saveData()">PUBLISH TO LOBBY</button>
</div>

<div class="game-list" id="gameList"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = { apiKey: "AIzaSyAzfvbiqRqsQwBOOIkegxJD09di-S_tfHg", authDomain: "test-eb5e7.firebaseapp.com", databaseURL: "https://test-eb5e7-default-rtdb.firebaseio.com", projectId: "test-eb5e7", appId: "1:366282855653:web:dca7e000f5a22fb11f300c" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let base64Img = "";

    // Image to Base64
    window.encodeImg = () => {
        const file = document.getElementById('imgInput').files[0];
        const reader = new FileReader();
        reader.onloadend = () => {
            base64Img = reader.result;
            const prev = document.getElementById('preview');
            prev.src = base64Img;
            prev.style.display = "block";
        };
        if(file) reader.readAsDataURL(file);
    };

    window.saveData = async () => {
        const name = document.getElementById('gName').value;
        const link = document.getElementById('gLink').value;
        const tag = document.getElementById('gTag').value;
        const badge = document.getElementById('gBadge').value;

        if(!base64Img || !name || !link) return alert("All fields are required!");

        const btn = document.getElementById('saveBtn');
        btn.disabled = true; btn.innerText = "Publishing...";

        await push(ref(db, "lobby_games"), {
            name, image: base64Img, link, tag: tag || "LIVE", badge: badge || ""
        });

        alert("Game Added!");
        location.reload();
    };

    // List logic
    onValue(ref(db, "lobby_games"), snap => {
        const container = document.getElementById('gameList');
        container.innerHTML = "";
        const data = snap.val();
        if(data) {
            Object.keys(data).forEach(key => {
                const g = data[key];
                container.innerHTML += `
                    <div class="item">
                        <img src="${g.image}">
                        <div class="item-name">${g.name}</div>
                        <div class="del" onclick="deleteG('${key}')">DELETE</div>
                    </div>`;
            });
        }
    });

    window.deleteG = (id) => { if(confirm("Delete this?")) remove(ref(db, `lobby_games/${id}`)); };
</script>
</body>
</html>
