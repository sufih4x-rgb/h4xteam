<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join DOT GAMES | Premium Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #4361ee; --bg: #f4f7fe; --white: #ffffff; --text-dark: #1e293b; --text-muted: #64748b; --success: #10b981; }
        body { background: var(--bg); color: var(--text-dark); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .auth-container { width: 100%; max-width: 450px; }
        .auth-card { background: var(--white); padding: 30px 25px; border-radius: 32px; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05); text-align: center; }
        .logo-area { width: 60px; height: 60px; background: #eef2ff; color: var(--primary); border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 800; margin: 0 auto 20px; }
        h1 { font-size: 22px; font-weight: 800; margin-bottom: 5px; }
        p { font-size: 13px; color: var(--text-muted); margin-bottom: 25px; }
        
        .row { display: flex; gap: 15px; text-align: left; }
        .input-group { text-align: left; margin-bottom: 15px; position: relative; flex: 1; }
        
        label { font-size: 11px; font-weight: 800; color: var(--text-dark); margin-bottom: 6px; display: block; text-transform: uppercase; }
        input { width: 100%; padding: 14px; background: #f8fafc; border: 2px solid #f1f5f9; border-radius: 14px; font-size: 14px; font-weight: 600; box-sizing: border-box; outline: none; transition: 0.2s; }
        input:focus { border-color: var(--primary); background: #fff; }
        
        .pass-wrapper { position: relative; }
        .toggle-pass { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: var(--text-muted); cursor: pointer; font-size: 16px; }

        .btn { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 16px; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn:disabled { background: #cbd5e1; cursor: not-allowed; }
        .ref-tag { display: inline-block; padding: 5px 15px; background: #dcfce7; color: #166534; border-radius: 20px; font-size: 11px; font-weight: 700; margin-bottom: 15px; }
        .footer-link { margin-top: 20px; display: block; font-size: 14px; font-weight: 600; color: var(--primary); text-decoration: none; }
    </style>
</head>
<body>

<div class="auth-container">
    <div id="registerForm" class="auth-card">
        <div class="logo-area">D</div>
        <div id="refBadge"></div>
        <h1>Join the Arena</h1>
        <p>Complete your profile to start earning.</p>

        <div class="row">
            <div class="input-group">
                <label>First Name</label>
                <input id="fName" type="text" placeholder="John">
            </div>
            <div class="input-group">
                <label>Last Name</label>
                <input id="lName" type="text" placeholder="Doe">
            </div>
        </div>

        <div class="input-group">
            <label>Username</label>
            <input id="userName" type="text" placeholder="e.g. gamer_77">
        </div>

        <div class="input-group">
            <label>Email Address</label>
            <input id="email" type="email" placeholder="name@example.com">
        </div>

        <div class="input-group">
            <label>Mobile Number</label>
            <input id="mobile" type="tel" placeholder="10 digit number">
        </div>

        <div class="input-group">
            <label>Password</label>
            <div class="pass-wrapper">
                <input id="pass" type="password" placeholder="••••••••">
                <i class="fa-solid fa-eye-slash toggle-pass" onclick="togglePassword('pass', this)"></i>
            </div>
        </div>

        <div class="input-group">
            <label>Confirm Password</label>
            <div class="pass-wrapper">
                <input id="passConfirm" type="password" placeholder="••••••••">
                <i class="fa-solid fa-eye-slash toggle-pass" onclick="togglePassword('passConfirm', this)"></i>
            </div>
        </div>

        <button id="regBtn" class="btn" onclick="handleRegister()">Create Account</button>
        <a href="index.html" class="footer-link">Already have an account? Sign In</a>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAzfvbiqRqsQwBOOIkegxJD09di-S_tfHg",
        authDomain: "test-eb5e7.firebaseapp.com",
        databaseURL: "https://test-eb5e7-default-rtdb.firebaseio.com",
        projectId: "test-eb5e7",
        appId: "1:366282855653:web:dca7e000f5a22fb11f300c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    const refID = new URLSearchParams(window.location.search).get('ref') || "none";
    if (refID !== "none") document.getElementById('refBadge').innerHTML = `<span class="ref-tag">Referral Applied</span>`;

    window.togglePassword = (id, icon) => {
        const input = document.getElementById(id);
        if (input.type === "password") {
            input.type = "text";
            icon.classList.replace("fa-eye-slash", "fa-eye");
        } else {
            input.type = "password";
            icon.classList.replace("fa-eye", "fa-eye-slash");
        }
    };

    window.handleRegister = async function() {
        const firstName = document.getElementById("fName").value.trim();
        const lastName = document.getElementById("lName").value.trim();
        const username = document.getElementById("userName").value.trim();
        const email = document.getElementById("email").value.trim();
        const mobile = document.getElementById("mobile").value.trim();
        const pass = document.getElementById("pass").value;
        const passConfirm = document.getElementById("passConfirm").value;
        const btn = document.getElementById("regBtn");

        // Validation logic
        if (!firstName || !lastName || !username || !email || mobile.length < 10) {
            return alert("Please fill all details correctly!");
        }
        if (pass.length < 6) return alert("Password must be at least 6 characters!");
        if (pass !== passConfirm) return alert("Passwords do not match!");

        btn.disabled = true;
        btn.innerText = "Creating Account...";

        try {
            // 1. Create User in Firebase Auth
            const res = await createUserWithEmailAndPassword(auth, email, pass);
            const user = res.user;

            // 2. Save all info to Realtime Database (Email verification skipped as requested)
            await set(ref(db, "users/" + user.uid), {
                firstName: firstName,
                lastName: lastName,
                username: username,
                email: email,
                mobile: mobile,
                balance: 0,
                activeReferrals: 0,
                referredBy: refID,
                hasDeposited: false,
                teamTurnover: 0,
                claimedRewards: { m5: false, m10: false },
                createdAt: Date.now()
            });

            alert("Registration Successful!");
            window.location.href = "dashboard.html"; // Redirect to your home/dashboard page

        } catch (e) {
            alert("Error: " + e.message);
            btn.disabled = false;
            btn.innerText = "Create Account";
        }
    };
</script>
</body>
</html>
