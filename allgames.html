<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOT Hub | Live Lobby</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4361ee; --bg: #ffffff; --card-bg: #f8faff; }
        body { background: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 0; color: #1e293b; overflow-x: hidden; }
        .top-nav { display: flex; justify-content: space-between; align-items: center; padding: 20px; position: sticky; top: 0; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); z-index: 100; border-bottom: 1px solid #f1f5f9; }
        .balance-section b { display: block; font-size: 20px; color: var(--primary); }
        .lobby-container { max-width: 480px; margin: auto; padding: 20px; }
        .game-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .game-card { background: var(--card-bg); border-radius: 24px; padding: 10px; border: 1px solid #edf2f7; text-decoration: none; color: inherit; transition: 0.3s; position: relative; overflow: hidden; display: block; }
        .game-card:active { transform: scale(0.95); }
        .game-img { width: 100%; height: 120px; border-radius: 18px; object-fit: cover; margin-bottom: 8px; background: #eee; }
        .game-info h3 { margin: 0; font-size: 14px; font-weight: 800; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .badge-abs { position: absolute; top: 15px; right: 15px; background: #ff4757; color: #fff; font-size: 9px; padding: 4px 8px; border-radius: 8px; font-weight: 900; z-index: 2; }
        .tag { font-size: 10px; display: block; text-align: center; margin-top: 5px; color: var(--primary); font-weight: 700; }
    </style>
</head>
<body>

<div class="top-nav">
    <div class="balance-section"><small style="font-size:10px; font-weight:800; color:#94a3b8;">BALANCE</small><b>₹<span id="uBal">0.00</span></b></div>
    <div style="background:#1e293b; color:#fff; padding:8px 15px; border-radius:12px; font-size:12px; font-weight:900;">H4X TEAM</div>
</div>

<div class="lobby-container">
    <div style="font-weight:800; margin-bottom:15px; font-size: 18px;">🔥 PREMIUM GAMES</div>
    <div class="game-grid" id="gameGrid">
        </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = { apiKey: "AIzaSyAzfvbiqRqsQwBOOIkegxJD09di-S_tfHg", authDomain: "test-eb5e7.firebaseapp.com", databaseURL: "https://test-eb5e7-default-rtdb.firebaseio.com", projectId: "test-eb5e7", appId: "1:366282855653:web:dca7e000f5a22fb11f300c" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    onAuthStateChanged(auth, u => {
        if(u) {
            onValue(ref(db, `users/${u.uid}`), s => {
                document.getElementById("uBal").innerText = (s.val()?.balance || 0).toFixed(2);
            });
        } else { window.location.href = "login.html"; }
    });

    const grid = document.getElementById('gameGrid');
    onValue(ref(db, "lobby_games"), snap => {
        grid.innerHTML = "";
        const data = snap.val();
        if(data) {
            Object.values(data).forEach(g => {
                grid.innerHTML += `
                    <a href="${g.link}" class="game-card">
                        ${g.badge ? `<div class="badge-abs">${g.badge}</div>` : ''}
                        <img src="${g.image}" class="game-img">
                        <div class="game-info">
                            <h3>${g.name}</h3>
                            <span class="tag">${g.tag}</span>
                        </div>
                    </a>`;
            });
        } else { grid.innerHTML = "<p style='text-align:center; grid-column:span 2;'>Loading games...</p>"; }
    });
</script>
</body>
</html>
