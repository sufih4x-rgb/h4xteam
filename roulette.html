<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Roulette Royale | High Stakes</title>
    <style>
        :root { --gold: #fbbf24; --bg: #064e3b; }
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow-x: hidden; }
        .app { width: 100%; max-width: 450px; min-height: 100vh; background: radial-gradient(circle at top, #065f46, #000); position: relative; margin: auto; }
        .header { display: flex; justify-content: space-between; padding: 15px; background: #022c22; border-bottom: 2px solid var(--gold); }
        .bal-txt { color: var(--gold); font-weight: 900; font-size: 18px; }
        .wheel-zone { height: 160px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .ball-pit { width: 100px; height: 100px; border: 5px double var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 40px; font-weight: 900; background: #111; box-shadow: 0 0 20px rgba(251, 191, 36, 0.3); transition: 0.5s; }
        .spin-anim { animation: rotate 0.2s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; padding: 10px; margin-bottom: 100px; }
        .cell { background: #1e293b; height: 50px; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-weight: 900; cursor: pointer; border: 1px solid #334155; position: relative; }
        .r { background: #dc2626; } .b { background: #111; } .g { background: #16a34a; grid-column: span 3; }
        .chip-tag { position: absolute; top: -5px; right: -5px; background: var(--gold); color: #000; font-size: 9px; padding: 2px 5px; border-radius: 5px; display: none; }
        .footer { position: fixed; bottom: 0; width: 100%; max-width: 450px; background: #022c22; padding: 15px; border-radius: 20px 20px 0 0; box-sizing: border-box; }
        .chip-sel { display: flex; justify-content: center; gap: 10px; }
        .chip { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; cursor: pointer; border: 2px dashed #fff; opacity: 0.6; }
        .chip.active { opacity: 1; border: 2px solid var(--gold); transform: scale(1.1); }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <div class="bal-txt">₹<span id="uBal">0.00</span></div>
        <div id="timer" style="color:var(--gold); font-weight:bold;">45s</div>
    </div>
    <div class="wheel-zone">
        <div id="res-box" class="ball-pit">?</div>
        <div id="status" style="font-size:12px; margin-top:10px; color:#aaa;">PLACE YOUR BETS</div>
    </div>
    <div class="grid" id="betGrid">
        <div class="cell g" onclick="placeBet(0)">0 <div id="chip0" class="chip-tag">0</div></div>
    </div>
    <div class="footer">
        <div class="chip-sel">
            <div class="chip active" onclick="selC(10, this)" style="background:#1d4ed8">10</div>
            <div class="chip" onclick="selC(50, this)" style="background:#059669">50</div>
            <div class="chip" onclick="selC(100, this)" style="background:#b91c1c">100</div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, onValue, update, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = { apiKey: "AIzaSyAzfvbiqRqsQwBOOIkegxJD09di-S_tfHg", authDomain: "test-eb5e7.firebaseapp.com", databaseURL: "https://test-eb5e7-default-rtdb.firebaseio.com", projectId: "test-eb5e7", appId: "1:366282855653:web:dca7e000f5a22fb11f300c" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    let uid, uBal=0, selChip=10, myBets={}, bettingOpen=false;
    const reds = [1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36];

    // Build Grid
    const grid = document.getElementById('betGrid');
    for(let i=1; i<=36; i++){
        const c = reds.includes(i) ? 'r' : 'b';
        grid.innerHTML += `<div class="cell ${c}" onclick="placeBet(${i})">${i}<div id="chip${i}" class="chip-tag">0</div></div>`;
    }

    onAuthStateChanged(auth, u => {
        if(!u) return; uid=u.uid;
        onValue(ref(db, `users/${uid}`), s => {
            uBal = s.val()?.balance || 0;
            document.getElementById("uBal").innerText = uBal.toFixed(2);
        });
        sync();
    });

    function sync() {
        onValue(ref(db, "roulette_live"), s => {
            const d = s.val(); if(!d) return;
            document.getElementById("timer").innerText = d.time + "s";
            if(d.state === "BETTING") {
                bettingOpen = true; resetUI();
            } else {
                if(bettingOpen) checkWin(d.result);
                bettingOpen = false;
                spinWheel(d.result);
            }
        });
    }

    window.placeBet = async (n) => {
        if(!bettingOpen || uBal < selChip) return;
        myBets[n] = (myBets[n] || 0) + selChip;
        await update(ref(db, `users/${uid}`), { balance: increment(-selChip) });
        // Send bet to admin for rigging
        await update(ref(db, `roulette_live/totalBets/${n}`), { amt: increment(selChip) });
        const tag = document.getElementById(`chip${n}`);
        tag.innerText = "₹"+myBets[n]; tag.style.display = "block";
    };

    function spinWheel(res) {
        const rb = document.getElementById("res-box");
        rb.classList.add("spin-anim"); rb.innerText = "?";
        setTimeout(() => {
            rb.classList.remove("spin-anim");
            rb.innerText = res;
            rb.style.color = reds.includes(res) ? "#ff4757" : (res===0 ? "#2ed573" : "#fff");
        }, 3000);
    }

    async function checkWin(winNum) {
        const bet = myBets[winNum] || 0;
        if(bet > 0) {
            const winAmt = bet * 36;
            await update(ref(db, `users/${uid}`), { balance: increment(winAmt) });
        }
        myBets = {};
    }

    function resetUI() {
        document.querySelectorAll(".chip-tag").forEach(t => t.style.display="none");
        document.getElementById("res-box").style.color = "var(--gold)";
    }

    window.selC = (v, el) => {
        selChip = v;
        document.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
        el.classList.add("active");
    };
</script>
</body>
</html>
