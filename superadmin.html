<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Control | DOT GAMES</title>
    <style>
        :root { --gold: #d4af37; --sky: #00d2ff; --white: #ffffff; }
        body { background: #fdfdfd; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: var(--white); border-radius: 35px; padding: 40px; width: 100%; max-width: 450px; box-shadow: 0 25px 50px rgba(212, 175, 55, 0.15); border: 1px solid #f0f0f0; text-align: center; }
        h1 { color: var(--gold); font-weight: 900; letter-spacing: 2px; margin-bottom: 30px; }
        input { width: 100%; padding: 16px; margin: 12px 0; border-radius: 15px; border: 2px solid #eee; box-sizing: border-box; font-size: 16px; outline: none; transition: 0.3s; font-weight: 600; }
        input:focus { border-color: var(--sky); box-shadow: 0 0 10px rgba(0, 210, 255, 0.1); }
        .btn-sky { width: 100%; padding: 18px; border-radius: 15px; border: none; background: var(--sky); color: white; font-weight: 800; cursor: pointer; font-size: 16px; box-shadow: 0 8px 20px rgba(0, 210, 255, 0.3); margin-top: 10px; }
        .forgot-link { color: #888; font-size: 14px; text-decoration: none; display: block; margin-top: 15px; cursor: pointer; font-weight: 600; }
        .forgot-link:hover { color: var(--gold); }
        #masterPanel { display: none; }
        .req-item { background: #fff; padding: 15px; border-radius: 15px; border: 1px solid #eee; margin-top: 15px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

<div id="loginBox" class="card">
    <h1>MASTER LOGIN</h1>
    <input type="email" id="email" value="sufih4x@gmail.com" readonly style="background:#f9f9f9; color:#999;">
    <input type="password" id="pass" placeholder="Enter Admin Password">
    <button class="btn-sky" onclick="handleLogin()">LOGIN NOW</button>
    <span class="forgot-link" onclick="handleForgot()">Forgot Password? (Send to Email)</span>
</div>

<div id="masterPanel" class="card">
    <h1>CONTROL PANEL</h1>
    <p style="color:#666; font-weight:600;">Set Super UPI ID</p>
    <input type="text" id="sUpi" placeholder="master@upi">
    <button class="btn-sky" onclick="updateMasterUpi()">UPDATE MASTER UPI</button>
    
    <div id="adminRequests" style="margin-top:30px;">
        <h3 style="color:var(--gold)">Admin Stock Requests</h3>
        <div id="reqList"></div>
    </div>
    
    <button onclick="handleLogout()" style="margin-top:30px; background:none; border:none; color:#ff4d4d; font-weight:bold; cursor:pointer;">Logout Security</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, update, onValue, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyAzfvbiqRqsQwBOOIkegxJD09di-S_tfHg", 
        authDomain: "test-eb5e7.firebaseapp.com", 
        databaseURL: "https://test-eb5e7-default-rtdb.firebaseio.com", 
        projectId: "test-eb5e7", 
        appId: "1:366282855653:web:dca7e000f5a22fb11f300c" 
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    // Login logic
    window.handleLogin = () => {
        const e = document.getElementById('email').value;
        const p = document.getElementById('pass').value;
        if(!p) return alert("Password toh dalo bhai!");
        
        signInWithEmailAndPassword(auth, e, p)
            .then(() => { alert("Welcome Master Sufi!"); })
            .catch(err => { alert("Login Failed: " + err.message); });
    };

    // Forgot Password logic
    window.handleForgot = () => {
        const e = "sufih4x@gmail.com";
        sendPasswordResetEmail(auth, e)
            .then(() => { alert("Password reset link aapki email (sufih4x@gmail.com) par bhej diya gaya hai!"); })
            .catch(err => { alert("Error: " + err.message); });
    };

    // Logout logic
    window.handleLogout = () => signOut(auth);

    // Track Auth State
    onAuthStateChanged(auth, user => {
        if(user && user.email === "sufih4x@gmail.com") {
            document.getElementById('loginBox').style.display = "none";
            document.getElementById('masterPanel').style.display = "block";
            loadAdminRequests();
        } else {
            document.getElementById('loginBox').style.display = "block";
            document.getElementById('masterPanel').style.display = "none";
        }
    });

    // Update Master UPI
    window.updateMasterUpi = () => {
        const upi = document.getElementById('sUpi').value;
        if(!upi.includes('@')) return alert("Invalid UPI ID!");
        update(ref(db, "settings"), { super_upi: upi })
            .then(() => alert("Master UPI Live Ho Gaya!"));
    };

    // Load Admin Stock Requests
    function loadAdminRequests() {
        onValue(ref(db, "stock_requests"), snap => {
            let html = "";
            snap.forEach(child => {
                const data = child.val();
                if(data.status === "pending") {
                    html += `
                    <div class="req-item">
                        <div style="text-align:left">
                            <b style="color:var(--sky)">${data.adminId}</b><br>
                            <small>₹${data.amount} | UTR: ${data.utr}</small>
                        </div>
                        <button onclick="approveStock('${child.key}','${data.adminId}',${data.amount})" style="background:var(--gold); border:none; padding:10px; color:white; border-radius:10px; cursor:pointer; font-weight:bold;">ADD</button>
                    </div>`;
                }
            });
            document.getElementById('reqList').innerHTML = html || "<p style='color:#ccc'>No Pending Requests</p>";
        });
    }

    // Approve Admin Stock
    window.approveStock = async (rid, aid, amt) => {
        await update(ref(db, `admins/${aid}`), { stock: increment(amt) });
        await update(ref(db, `stock_requests/${rid}`), { status: "approved" });
        alert("Stock Refilled Successfully!");
    };
</script>
</body>
</html>
