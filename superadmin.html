<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Super Admin | Master Control</title>
    <style>body{background:#450a0a; color:white; font-family:sans-serif; padding:20px;}.card{background:#7f1d1d; padding:20px; border-radius:10px; border:2px solid gold;}</style>
</head>
<body>
    <div class="card">
        <h1>SUPER ADMIN CONTROL</h1>
        <input type="text" id="supUpi" placeholder="Set Super UPI (upi@ybl)">
        <button onclick="setUPI()">Update UPI</button>
    </div>
    <h3>Admin Stock Requests</h3>
    <div id="sList"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, update, onValue, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = { /* SAME CONFIG */ };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    onAuthStateChanged(auth, u => {
        if(!u || u.email !== "sufih4x@gmail.com") document.body.innerHTML = "Access Denied";
    });

    window.setUPI = () => { update(ref(db, "super_settings"), { upi: document.getElementById('supUpi').value }); alert("Updated!"); };

    onValue(ref(db, "super_requests"), s => {
        let h = "";
        s.forEach(c => {
            const d = c.val();
            if(d.status === "pending") h += `<div style="background:#000; padding:10px; margin:5px;">${d.adminId} | ₹${d.amount} | UTR: ${d.utr} <button onclick="refill('${c.key}','${d.adminId}',${d.amount})" style="background:gold;">ADD STOCK</button></div>`;
        });
        document.getElementById('sList').innerHTML = h;
    });

    window.refill = async (rid, aid, amt) => {
        await update(ref(db, `admins/${aid}`), { stock: increment(amt) });
        await update(ref(db, `super_requests/${rid}`), { status: "approved" });
        alert("Stock Added to Admin!");
    };
</script>
</body>
</html>
