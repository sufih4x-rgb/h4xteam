<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Super Admin</title>
    <style>
        :root { --gold: #d4af37; --sky: #00d2ff; }
        body { background: #fff; font-family: sans-serif; text-align: center; padding: 50px; }
        .master-card { border: 4px solid var(--gold); border-radius: 40px; padding: 40px; max-width: 500px; margin: auto; }
        input { padding: 15px; width: 80%; border-radius: 10px; border: 2px solid #eee; margin-bottom: 20px; }
        .btn-master { background: var(--sky); color: white; border: none; padding: 15px 30px; border-radius: 10px; font-weight: 900; cursor: pointer; }
    </style>
</head>
<body>

<div class="master-card">
    <h1 style="color:var(--gold)">MASTER PANEL</h1>
    <input type="text" id="sUpi" placeholder="Set Master UPI">
    <button class="btn-master" onclick="updateSuperUpi()">UPDATE MASTER UPI</button>
    <div id="adminReqs"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, update, onValue, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyAzfvbiqRqsQwBOOIkegxJD09di-S_tfHg", 
        authDomain: "test-eb5e7.firebaseapp.com", 
        databaseURL: "https://test-eb5e7-default-rtdb.firebaseio.com", 
        projectId: "test-eb5e7", 
        appId: "1:366282855653:web:dca7e000f5a22fb11f300c" 
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    onAuthStateChanged(auth, u => {
        if(!u || u.email !== "sufih4x@gmail.com") document.body.innerHTML = "<h1>Unauthorized!</h1>";
    });

    window.updateSuperUpi = () => {
        update(ref(db, "settings"), { super_upi: document.getElementById('sUpi').value });
        alert("Master UPI Updated!");
    };

    onValue(ref(db, "stock_requests"), s => {
        let h = "<h3>Admin Requests:</h3>";
        s.forEach(c => {
            const d = c.val();
            if(d.status === "pending") h += `<div>${d.adminId} (₹${d.amount}) <button onclick="refillAdmin('${c.key}','${d.adminId}',${d.amount})">ADD STOCK</button></div>`;
        });
        document.getElementById('adminReqs').innerHTML = h;
    });

    window.refillAdmin = async (rid, aid, amt) => {
        await update(ref(db, `admins/${aid}`), { stock: increment(amt) });
        await update(ref(db, `stock_requests/${rid}`), { status: "approved" });
        alert("Stock Added!");
    };
</script>
</body>
</html>
