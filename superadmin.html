<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Master Admin | DOT GAMES</title>
    <style>
        :root { --gold: #d4af37; --sky: #00d2ff; }
        body { background: #fff; font-family: sans-serif; padding: 30px; text-align: center; }
        .master-card { border: 3px solid var(--gold); border-radius: 30px; padding: 40px; max-width: 600px; margin: auto; }
        input { padding: 15px; width: 300px; border-radius: 10px; border: 2px solid #eee; margin-bottom: 20px; }
        .btn-gold { background: var(--sky); color: white; border: none; padding: 15px 40px; border-radius: 10px; font-weight: 900; cursor: pointer; box-shadow: 0 5px 15px rgba(0, 210, 255, 0.3); }
        .admin-req { background: #f9f9f9; padding: 20px; border-radius: 15px; margin-top: 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #eee; }
    </style>
</head>
<body>

<div class="master-card">
    <h1 style="color:var(--gold)">MASTER CONTROL</h1>
    <input type="text" id="supUpi" placeholder="Set Master UPI ID">
    <br>
    <button class="btn-gold" onclick="setUPI()">UPDATE MASTER UPI</button>
    
    <div id="aReqs" style="margin-top:40px;"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, update, onValue, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    const firebaseConfig = { /* SAME CONFIG */ };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    onAuthStateChanged(auth, u => {
        if(!u || u.email !== "sufih4x@gmail.com") document.body.innerHTML = "<h1>Unauthorized!</h1>";
    });

    window.setUPI = () => { update(ref(db, "super_settings"), { upi: document.getElementById('supUpi').value }); alert("Master UPI Updated!"); };

    onValue(ref(db, "super_requests"), s => {
        let h = "<h3 style='color:var(--gold)'>Admin Refill Requests</h3>";
        s.forEach(c => {
            const d = c.val();
            if(d.status === "pending") h += `<div class="admin-req"><span><b>${d.adminId}</b> (₹${d.amount})</span> <button class="btn-gold" onclick="refill('${c.key}','${d.adminId}',${d.amount})">ADD STOCK</button></div>`;
        });
        document.getElementById('aReqs').innerHTML = h;
    });

    window.refill = async (rid, aid, amt) => {
        await update(ref(db, `admins/${aid}`), { stock: increment(amt) });
        await update(ref(db, `super_requests/${rid}`), { status: "approved" });
        alert("Stock added to Admin!");
    };
</script>
</body>
</html>
