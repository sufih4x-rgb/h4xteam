<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dragon Tiger | Master Admin</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .stats { display: flex; justify-content: center; gap: 15px; margin: 20px 0; }
        .box { background: #1e293b; padding: 20px; border-radius: 10px; width: 140px; border-bottom: 4px solid #334155; }
        .btn { padding: 15px 30px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; margin: 10px; list-style: none; text-decoration: none; }
        #timer { font-size: 40px; color: #fbbf24; }
    </style>
</head>
<body>
    <h1>DT LIVE CONTROL</h1>
    <div id="timer">00s</div>
    <div id="state-txt">INITIALIZING...</div>

    <div class="stats">
        <div class="box" style="border-color:#1e40af">Dragon<br><h2 id="aD">0</h2></div>
        <div class="box" style="border-color:#059669">Tie<br><h2 id="aTie">0</h2></div>
        <div class="box" style="border-color:#b45309">Tiger<br><h2 id="aT">0</h2></div>
    </div>

    <div style="margin-top:40px;">
        <h3>FORCE RESULT:</h3>
        <button class="btn" style="background:#1e40af" onclick="force('dragon')">DRAGON WIN</button>
        <button class="btn" style="background:#059669" onclick="force('tie')">TIE WIN</button>
        <button class="btn" style="background:#b45309" onclick="force('tiger')">TIGER WIN</button>
        <p id="f-msg">Current Mode: AUTO (Low Bet Wins)</p>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, update, set, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = { apiKey: "AIzaSyAzfvbiqRqsQwBOOIkegxJD09di-S_tfHg", authDomain: "test-eb5e7.firebaseapp.com", databaseURL: "https://test-eb5e7-default-rtdb.firebaseio.com", projectId: "test-eb5e7", appId: "1:366282855653:web:dca7e000f5a22fb11f300c" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let state = "BETTING", forcedSide = null;
    let bD = 0, bT = 0, bTie = 0;
    let localCurrentPeriod = 0, adminProcessed = false;

    // Connect to global distributed master sync clock
    onValue(ref(db, ".info/serverTimeOffset"), offsetSnap => {
        const offset = offsetSnap.val() || 0;
        
        setInterval(() => {
            const serverTime = Date.now() + offset;
            const totalSeconds = Math.floor(serverTime / 1000);
            const secondInMinute = totalSeconds % 60;
            const periodId = Math.floor(totalSeconds / 60);

            const timerEl = document.getElementById("timer");
            const stateEl = document.getElementById("state-txt");

            if (localCurrentPeriod !== periodId) {
                localCurrentPeriod = periodId;
                adminProcessed = false;
                resetBets();
            }

            if (secondInMinute < 45) {
                // Live Sync Betting Phase
                state = "BETTING";
                let timeLeft = 45 - secondInMinute;
                timerEl.innerText = timeLeft + "s";
                stateEl.innerText = state + " (PERIOD: " + periodId + ")";
                timerEl.style.color = "#fbbf24";
            } else {
                // Live Sync Reveal/Result Phase
                state = "RESULT";
                let timeLeft = 60 - secondInMinute;
                timerEl.innerText = timeLeft + "s";
                stateEl.innerText = state;
                timerEl.style.color = "#ff4757";

                if (!adminProcessed) {
                    adminProcessed = true;
                    processMatch(periodId);
                }
            }
        }, 1000);
    });

    async function processMatch(periodId) {
        let winSide = "";
        
        // 1. Check if admin clicked Force Button
        if(forcedSide) {
            winSide = forcedSide;
        } else {
            // 2. Auto-Rigging Option: Calculate low bet side
            if(bD <= bT && bD <= bTie) winSide = 'dragon';
            else if(bT <= bD && bT <= bTie) winSide = 'tiger';
            else winSide = 'tie';
        }

        // Card Index assignment logic
        let dc, tc;
        if(winSide === 'dragon') { dc = 12; tc = 2; } // K vs 3
        else if(winSide === 'tiger') { dc = 2; tc = 12; }  // 3 vs K
        else { dc = 7; tc = 7; }                           // 8 vs 8 (Tie)

        // Force write to the shared dt_history path to seamlessly handle user win/losses
        const historyRef = ref(db, `dt_history/${periodId}`);
        await set(historyRef, {
            period: periodId,
            winner: winSide,
            dCard: dc,
            tCard: tc,
            timestamp: Date.now()
        });

        // Sync old state structure to make sure users page catches results instantly
        await update(ref(db, "dt_live"), { 
            dCard: dc, 
            tCard: tc, 
            winner: winSide, 
            state: "RESULT" 
        });

        // Clear force toggle for next turn
        forcedSide = null;
        document.getElementById("f-msg").innerText = "Current Mode: AUTO (Low Bet Wins)";
    }

    function resetBets() {
        bD = 0; bT = 0; bTie = 0;
        document.getElementById("aD").innerText = "0";
        document.getElementById("aT").innerText = "0";
        document.getElementById("aTie").innerText = "0";
        update(ref(db, "dt_live"), { totalDragon: 0, totalTiger: 0, totalTie: 0, state: "BETTING" });
    }

    window.force = (s) => {
        forcedSide = s;
        document.getElementById("f-msg").innerText = "FORCE WIN SET: " + s.toUpperCase();
    }

    // Live monitor incoming active chips from all online users
    onValue(ref(db, "dt_live"), snap => {
        const d = snap.val();
        if(!d) return;
        bD = d.totalDragon || 0; bT = d.totalTiger || 0; bTie = d.totalTie || 0;
        document.getElementById("aD").innerText = bD;
        document.getElementById("aT").innerText = bT;
        document.getElementById("aTie").innerText = bTie;
    });
</script>
</body>
</html>
