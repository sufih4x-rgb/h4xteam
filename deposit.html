<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Deposit Money | DOT GAMES</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4361ee; --bg: #f8f9fc; --success: #06d6a0; --text: #1e293b; }
        body { background: var(--bg); font-family: 'Inter', sans-serif; margin: 0; display: flex; justify-content: center; color: var(--text); }
        .app { width: 100%; max-width: 480px; min-height: 100vh; background: #fff; padding: 20px; box-sizing: border-box; }
        .header { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; }
        .qr-card { background: #fff; border: 2px solid #f1f5f9; border-radius: 24px; padding: 25px; text-align: center; margin-bottom: 20px; }
        #qrBox img { width: 200px; height: 200px; border-radius: 15px; border: 1px solid #eee; padding: 8px; }
        input { width: 100%; padding: 15px; border-radius: 14px; border: 2px solid #f1f5f9; box-sizing: border-box; font-size: 16px; font-weight: 700; outline: none; margin: 10px 0; }
        .btn-submit { width: 100%; padding: 18px; border-radius: 16px; border: none; background: var(--primary); color: white; font-weight: 800; cursor: pointer; box-shadow: 0 8px 20px rgba(67, 97, 238, 0.2); }
        .history-row { background: #f8fafc; padding: 15px; border-radius: 16px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #f1f5f9; }
        .status-pill { padding: 5px 12px; border-radius: 10px; font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .pill-pending { background: #fff7ed; color: #9a3412; }
        .pill-approved { background: #ecfdf5; color: #065f46; }
    </style>
</head>
<body>
<div class="app">
    <div class="header"><h2>Add Money</h2></div>
    <div class="qr-card">
        <div id="qrBox"><p style="color:#94a3b8;">Enter amount to generate QR</p></div>
    </div>
    <input type="number" id="depAmt" placeholder="Enter Amount (Min ₹100)" oninput="generateQR()">
    <div id="utrSection" style="display:none;">
        <input type="text" id="utrInp" placeholder="Enter 12-Digit UTR Number" maxlength="12">
        <button class="btn-submit" onclick="submitDeposit()">SUBMIT DEPOSIT</button>
    </div>
    <div style="margin-top:30px;">
        <label>Recent Transactions</label>
        <div id="depositHistory"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, push, serverTimestamp, onValue, query, orderByChild, equalTo } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = { apiKey: "AIzaSyAzfvbiqRqsQwBOOIkegxJD09di-S_tfHg", authDomain: "test-eb5e7.firebaseapp.com", databaseURL: "https://test-eb5e7-default-rtdb.firebaseio.com", projectId: "test-eb5e7", appId: "1:366282855653:web:dca7e000f5a22fb11f300c" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    let userObj = null;
    let ADMIN_UPI = "";

    onValue(ref(db, "admin_settings/upi"), s => { if(s.exists()) ADMIN_UPI = s.val().id; });
    onAuthStateChanged(auth, u => { if(u) { userObj = u; loadHistory(); } });

    window.generateQR = () => {
        const amt = document.getElementById('depAmt').value;
        if(amt >= 100 && ADMIN_UPI) {
            const url = `upi://pay?pa=${ADMIN_UPI}&pn=DOTGAMES&am=${amt}&cu=INR`;
            document.getElementById('qrBox').innerHTML = `<img src="https://api.qrserver.com/v1/create-qr-code/?data=${encodeURIComponent(url)}">`;
            document.getElementById('utrSection').style.display = "block";
        }
    };

    window.submitDeposit = async () => {
        const utr = document.getElementById('utrInp').value;
        if(utr.length < 12) return alert("Invalid UTR");
        await push(ref(db, "deposit_requests"), { uid: userObj.uid, email: userObj.email, amount: parseFloat(document.getElementById('depAmt').value), utr, status: "pending", timestamp: serverTimestamp() });
        alert("Request Submitted!");
    };

    function loadHistory() {
        onValue(query(ref(db, "deposit_requests"), orderByChild("uid"), equalTo(userObj.uid)), snap => {
            let h = "";
            snap.forEach(c => {
                const d = c.val();
                h = `<div class="history-row"><b>₹${d.amount}</b><span class="status-pill pill-${d.status}">${d.status}</span></div>` + h;
            });
            document.getElementById('depositHistory').innerHTML = h;
        });
    }
</script>
</body>
</html>
