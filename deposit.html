<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">



<title>User Deposit Panel</title>



<style>



:root{

    --blue:#2563eb;

    --green:#22c55e;

    --red:#ef4444;

    --white:#ffffff;

    --gray:#6b7280;

}



*{

    margin:0;

    padding:0;

    box-sizing:border-box;

    font-family:'Segoe UI',sans-serif;

}



body{

    background:#f8fafc;

    padding:20px;

}



.card{

    max-width:420px;

    margin:auto;

    background:white;

    border-radius:25px;

    padding:20px;

    box-shadow:0 10px 30px rgba(0,0,0,0.08);

}



h2{

    text-align:center;

    font-size:26px;

    font-weight:800;

    color:#111827;

}



.sub{

    text-align:center;

    color:#6b7280;

    margin-bottom:15px;

}



input{

    width:100%;

    padding:15px;

    border-radius:14px;

    border:2px solid #e5e7eb;

    margin-top:10px;

    font-size:15px;

    font-weight:600;

    outline:none;

}



input:focus{

    border-color:var(--blue);

}



button{

    width:100%;

    padding:15px;

    border:none;

    border-radius:14px;

    background:var(--blue);

    color:white;

    font-weight:800;

    margin-top:12px;

    cursor:pointer;

}



#qrBox{

    text-align:center;

    margin-top:15px;

}



#qrBox img{

    width:240px;

    padding:10px;

    border:1px solid #eee;

    border-radius:20px;

}



.row{

    background:#fff;

    border:1px solid #eee;

    padding:15px;

    border-radius:18px;

    margin-top:10px;

    display:flex;

    justify-content:space-between;

}



.status{

    font-weight:800;

}



.green{color:var(--green);}

.red{color:var(--red);}

.blue{color:var(--blue);}



.balance{

    background:#111827;

    color:white;

    padding:18px;

    border-radius:20px;

    text-align:center;

    margin-bottom:15px;

}



.balance h3{

    margin:0;

    font-size:14px;

    opacity:0.7;

}



.balance h1{

    margin:5px 0 0;

    font-size:28px;

}



</style>

</head>



<body>



<div class="card">



<h2>Deposit</h2>

<p class="sub">Add money to your wallet</p>



<!-- BALANCE -->

<div class="balance">

<h3>BALANCE</h3>

<h1>₹<span id="balance">0</span></h1>

</div>



<input type="number" id="amount" placeholder="Enter Amount" oninput="generateQR()">



<div id="qrBox"></div>



<input type="text" id="utr" placeholder="Enter UTR (12 Digit)">



<button onclick="submitRequest()">SUBMIT</button>



<h3 style="margin-top:20px;">History</h3>

<div id="history"></div>



</div>



<script type="module">



import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import { getDatabase, ref, onValue, push, set, get, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";



const firebaseConfig = {

apiKey: "AIzaSyAzfvbiqRqsQwBOOIkegxJD09di-S_tfHg",

authDomain: "test-eb5e7.firebaseapp.com",

databaseURL: "https://test-eb5e7-default-rtdb.firebaseio.com",

projectId: "test-eb5e7",

storageBucket: "test-eb5e7.appspot.com",

appId: "1:366282855653:web:dca7e000f5a22fb11f300c"

};



const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

const auth = getAuth(app);



let uid = "";

let ADMIN_UPI = "";



// AUTH FIX (IMPORTANT)

onAuthStateChanged(auth,(user)=>{

if(user){

uid = user.uid;

loadData();

}else{

location.href = "index.html";

}

});



// LOAD SETTINGS

onValue(ref(db,"settings"),(snap)=>{

if(snap.exists()){

ADMIN_UPI = snap.val().admin_upi || "";

}

});



// BALANCE

function loadData(){



onValue(ref(db, `user_wallet/${uid}/balance`),(snap)=>{

document.getElementById("balance").innerText = snap.val() || 0;

});



// HISTORY

onValue(ref(db,"user_requests"),(snap)=>{

let html = "";



snap.forEach(c=>{

const d = c.val();



if(d.uid === uid){



let color = "blue";

if(d.status==="approved") color="green";

if(d.status==="rejected") color="red";



html = `

<div class="row">

<div>

<div>₹${d.amount}</div>

<small>${d.utr}</small>

</div>

<div class="status ${color}">

${d.status.toUpperCase()}

</div>

</div>

` + html;



}

});



document.getElementById("history").innerHTML = html || "No History";

});

}



// QR GENERATE

window.generateQR = () => {

let amt = document.getElementById("amount").value;



if(!ADMIN_UPI || !amt) return;



let upi = `upi://pay?pa=${ADMIN_UPI}&am=${amt}&cu=INR`;



document.getElementById("qrBox").innerHTML =

`<img src="https://api.qrserver.com/v1/create-qr-code/?data=${encodeURIComponent(upi)}">`;

};



// SUBMIT REQUEST

window.submitRequest = () => {



let amt = document.getElementById("amount").value;

let utr = document.getElementById("utr").value;



if(!amt || !utr){

return alert("Fill all fields");

}





if(utr.length !== 12){

return alert("Invalid UTR");

}



push(ref(db,"user_requests"),{

uid: uid,

amount: amt,

utr: utr,

status: "pending",

time: Date.now()

});



alert("Request Sent");

document.getElementById("utr").value = "";

};



</script>



</body>

</html>
