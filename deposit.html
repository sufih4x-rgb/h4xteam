<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Deposit Panel</title>
<style>
:root{
    --blue:#2563eb;
    --green:#22c55e;
    --red:#ef4444;
    --white:#ffffff;
    --gray:#6b7280;
}
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}
body{
    background:#f8fafc;
    padding:20px;
    position: relative;
    min-height: 100vh;
}
.card{
    max-width:420px;
    margin:auto;
    background:white;
    border-radius:25px;
    padding:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
    position: relative;
    overflow: hidden;
}
h2{
    text-align:center;
    font-size:26px;
    font-weight:800;
    color:#111827;
}
.sub{
    text-align:center;
    color:#6b7280;
    margin-bottom:15px;
}
input{
    width:100%;
    padding:15px;
    border-radius:14px;
    border:2px solid #e5e7eb;
    margin-top:10px;
    font-size:15px;
    font-weight:600;
    outline:none;
}
input:focus{
    border-color:var(--blue);
}
#qrBox{
    text-align:center;
    margin-top:15px;
}
#qrBox img{
    width:240px;
    padding:10px;
    border:1px solid #eee;
    border-radius:20px;
}
.row{
    background:#fff;
    border:1px solid #eee;
    padding:15px;
    border-radius:18px;
    margin-top:10px;
    display:flex;
    justify-content:space-between;
}
.status{
    font-weight:800;
}
.green{color:var(--green);}
.red{color:var(--red);}
.blue{color:var(--blue);}

.balance{
    background:#111827;
    color:white;
    padding:18px;
    border-radius:20px;
    text-align:center;
    margin-bottom:15px;
}
.balance h3{
    margin:0;
    font-size:14px;
    opacity:0.7;
}
.balance h1{
    margin:5px 0 0;
    font-size:28px;
}
.warning-paisa {
    font-size: 12px;
    color: #b45309;
    background: #fffbeb;
    padding: 12px;
    border-radius: 12px;
    margin-top: 10px;
    border: 1px solid #fef3c7;
    font-weight: 600;
    text-align: left;
}
.status-pill {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin: 10px auto 5px auto;
    padding: 10px 20px;
    border-radius: 30px;
    font-weight: 700;
    font-size: 13.5px;
    background: #f1f5f9;
    border: 1px solid #e5e7eb;
}
.status-dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    margin-right: 8px;
}
.dot-pending { background-color: #f59e0b; animation: pulse 1.4s infinite; }
.timer-badge {
    text-align: center;
    font-size: 15px;
    font-weight: 700;
    color: var(--red);
    background: #fee2e2;
    padding: 8px;
    border-radius: 10px;
    margin-top: 10px;
    letter-spacing: 0.5px;
}

/* --- PREMIUM SUCCESS OVERLAY ANIMATION --- */
.success-overlay {
    display: none;
    background: #ffffff;
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    padding: 30px 20px;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    z-index: 99;
}
.checkmark { width: 90px; height: 90px; border-radius: 50%; display: block; stroke-width: 4; stroke: #fff; stroke-miterlimit: 10; margin: 20px auto; box-shadow: inset 0px 0px 0px #10b981; animation: fillCheck 0.4s ease-in-out 0.4s forwards, scaleCheck 0.3s ease-in-out 0.9s forwards; }
.checkmark__circle { stroke-dasharray: 166; stroke-dashoffset: 166; stroke-width: 4; stroke-miterlimit: 10; stroke: #10b981; fill: none; animation: strokeCheck 0.6s cubic-bezier(0.65, 0, 0.45, 1) forwards; }
.checkmark__check { transform-origin: 50% 50%; stroke-dasharray: 48; stroke-dashoffset: 48; animation: strokeCheck 0.3s cubic-bezier(0.65, 0, 0.45, 1) 0.6s forwards; }
.success-title { font-size: 24px; font-weight: 800; color: #10b981; margin-bottom: 5px; text-align: center; }
.success-subtitle { font-size: 14px; color: #6b7280; font-weight: 500; margin-bottom: 20px; text-align: center; }
.success-details { background: #f0fdf4; width: 100%; border-radius: 14px; padding: 15px; border: 1px solid #bbf7d0; text-align: left; }
.success-details div { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 8px; }
.success-details div:last-child { margin-bottom: 0; }
.success-details span:first-child { color: #166534; font-weight: 600; }
.success-details span:last-child { color: #14532d; font-weight: 700; font-family: monospace; }
.btn-close-anim { width: 100%; padding: 13px; background: #10b981; color: white; border: none; border-radius: 12px; font-weight: 700; margin-top: 20px; cursor: pointer; }

@keyframes pulse {
    0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.5); }
    70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(245, 158, 11, 0); }
    100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(245, 158, 11, 0); }
}
@keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
@keyframes strokeCheck { 100% { stroke-dashoffset: 0; } }
@keyframes scaleCheck { 0%, 100% { transform: none; } 50% { transform: scale3d(1.1, 1.1, 1); } }
@keyframes fillCheck { 100% { box-shadow: inset 0px 0px 0px 60px #10b981; } }
</style>
</head>
<body>

<div class="card">
    <h2>Deposit</h2>
    <p class="sub">Add money to your wallet</p>

    <div class="balance">
        <h3>BALANCE</h3>
        <h1>₹<span id="balance">0</span></h1>
    </div>

    <input type="number" id="amount" placeholder="Enter Amount" oninput="generateQRAndListen()">
    
    <div id="timerContainer" class="timer-badge" style="display:none;">
        EXPIRY WINDOW: <span id="countdown">05:00</span>
    </div>

    <div id="paisaNotice" class="warning-paisa" style="display:none;"></div>
    
    <div id="dynamic-verification-status" style="text-align:center; display:none;">
        <div class="status-pill">
            <span class="status-dot dot-pending"></span>
            <span>Awaiting Automatic Bank Credit...</span>
        </div>
    </div>

    <div id="qrBox"></div>

    <h3 style="margin-top:20px;">History</h3>
    <div id="history"></div>

    <div id="successScreen" class="success-overlay">
        <svg class="checkmark" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 52">
            <circle class="checkmark__circle" cx="26" cy="26" r="25" fill="none"/>
            <path class="checkmark__check" fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8"/>
        </svg>
        <div class="success-title">Payment Verified!</div>
        <div class="success-subtitle">Your funds have been credited successfully.</div>
        <div class="success-details">
            <div>
                <span>Order Reference:</span>
                <span id="pop-txnid">-</span>
            </div>
            <div>
                <span>Wallet Credited:</span>
                <span id="pop-amt">₹0.00</span>
            </div>
            <div>
                <span>System Status:</span>
                <span style="color: #166534;">AUTO APPROVED</span>
            </div>
        </div>
        <button class="btn-close-anim" onclick="dismissSuccessPopup()">Done</button>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue, push, set, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyAzfvbiqRqsQwBOOIkegxJD09di-S_tfHg",
    authDomain: "test-eb5e7.firebaseapp.com",
    databaseURL: "https://test-eb5e7-default-rtdb.firebaseio.com",
    projectId: "test-eb5e7",
    storageBucket: "test-eb5e7.appspot.com",
    appId: "1:366282855653:web:dca7e000f5a22fb11f300c"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

let uid = "";
let ADMIN_UPI = "";
let currentPayloadAmount = "0.00";
let pureBaseAmount = 0;
let liveSmsWatcher = null;
let countdownTimer = null;
let currentTrackingKey = "";

onAuthStateChanged(auth,(user)=>{
    if(user){
        uid = user.uid;
        loadData();
    }else{
        location.href = "index.html";
    }
});

onValue(ref(db,"settings"),(snap)=>{
    if(snap.exists()){
        ADMIN_UPI = snap.val().admin_upi || "";
    }
});

function loadData(){
    onValue(ref(db, `user_wallet/${uid}/balance`),(snap)=>{
        document.getElementById("balance").innerText = snap.val() || 0;
    });

    onValue(ref(db,"user_requests"),(snap)=>{
        let html = "";
        snap.forEach(c=>{
            const d = c.val();
            if(d.uid === uid){
                let color = "blue";
                if(d.status==="approved") color="green";
                if(d.status==="rejected" || d.status==="expired") color="red";

                html = `
                <div class="row">
                <div>
                <div>₹${d.payable_amount || d.amount}</div>
                <small>${d.utr ? d.utr : (d.status === 'expired' ? 'QR Session Timeout' : 'Processing Automation...')}</small>
                </div>
                <div class="status ${color}">
                ${d.status.toUpperCase()}
                </div>
                </div>
                ` + html;
            }
        });
        document.getElementById("history").innerHTML = html || "No History";
    });
}

window.generateQRAndListen = async () => {
    let amt = document.getElementById("amount").value;
    
    // Reset any old polling or timer instances instantly
    if(liveSmsWatcher) clearInterval(liveSmsWatcher);
    if(countdownTimer) clearInterval(countdownTimer);
    
    if(!ADMIN_UPI || !amt || parseFloat(amt) <= 0) {
        document.getElementById("qrBox").innerHTML = "";
        document.getElementById("paisaNotice").style.display = "none";
        document.getElementById("dynamic-verification-status").style.display = "none";
        document.getElementById("timerContainer").style.display = "none";
        return;
    }

    pureBaseAmount = Math.floor(parseFloat(amt));
    
    // 0.01 to 0.50 Strict range random fractional engine
    let randomPaise = Math.floor(Math.random() * 50) + 1; 
    if(randomPaise < 10) randomPaise = "0" + randomPaise;
    
    currentPayloadAmount = pureBaseAmount + "." + randomPaise;

    document.getElementById("paisaNotice").innerText = `⚠️ Pay EXACT Amount: ₹${currentPayloadAmount}. (Wallet gets flat ₹${pureBaseAmount})`;
    document.getElementById("paisaNotice").style.display = "block";
    document.getElementById("dynamic-verification-status").style.display = "block";
    document.getElementById("timerContainer").style.display = "block";

    let upi = `upi://pay?pa=${ADMIN_UPI}&am=${currentPayloadAmount}&cu=INR`;
    document.getElementById("qrBox").innerHTML = `<img src="https://api.qrserver.com/v1/create-qr-code/?data=${encodeURIComponent(upi)}">`;

    // Create session mapping record node
    const trackingRef = push(ref(db,"user_requests"));
    currentTrackingKey = trackingRef.key;
    
    await set(trackingRef, {
        uid: uid,
        amount: pureBaseAmount,
        payable_amount: currentPayloadAmount,
        utr: "", 
        status: "pending",
        time: Date.now()
    });

    // Start Clock Countdown (300 Seconds = 5 Minutes)
    startExpiryClock(300);

    // Start background live network matching scanner
    triggerAutomatedSmsScanner();
};

function startExpiryClock(secondsLeft) {
    countdownTimer = setInterval(async () => {
        let mins = Math.floor(secondsLeft / 60);
        let secs = secondsLeft % 60;
        mins = mins < 10 ? "0" + mins : mins;
        secs = secs < 10 ? "0" + secs : secs;
        document.getElementById('countdown').innerText = `${mins}:${secs}`;

        if (--secondsLeft < 0) {
            clearInterval(countdownTimer);
            clearInterval(liveSmsWatcher);
            
            // Execute absolute structural session timeout
            document.getElementById("qrBox").innerHTML = "<div style='color:var(--red); font-weight:800; padding:40px 0; font-size:16px;'>⚠️ QR EXPIRED (TIMEOUT)</div>";
            document.getElementById("paisaNotice").style.display = "none";
            document.getElementById("dynamic-verification-status").style.display = "none";
            
            await set(ref(db, `user_requests/${currentTrackingKey}/status`), "expired");
        }
    }, 1000);
}

function triggerAutomatedSmsScanner() {
    liveSmsWatcher = setInterval(async () => {
        try {
            const response = await get(ref(db, "bank_sms"));
            const smsLogs = response.val();

            if (smsLogs) {
                for (let uniqueId in smsLogs) {
                    const smsBodyText = smsLogs[uniqueId].sms_text || "";
                    
                    if (smsBodyText.includes(currentPayloadAmount)) {
                        clearInterval(liveSmsWatcher);
                        clearInterval(countdownTimer);

                        let detectedBankUtr = "AUTO-" + Math.floor(Math.random() * 1000000000000);
                        let utrRegexMatch = smsBodyText.match(/(?:UTR|Ref|txnid)\s*:?\s*([0-9]{12})/i);
                        if (utrRegexMatch && utrRegexMatch[1]) {
                            detectedBankUtr = utrRegexMatch[1];
                        }

                        // Anti-Replay framework security step
                        const verifyHistory = await get(ref(db, "user_requests"));
                        let isUtrRecycled = false;
                        if(verifyHistory.exists()){
                            verifyHistory.forEach(child => {
                                if(child.val().utr === detectedBankUtr && child.val().status === "approved") {
                                    isUtrRecycled = true;
                                }
                            });
                        }

                        if(isUtrRecycled) {
                            console.log("Trace Intercepted: Reused bank code deployment killed.");
                            return;
                        }

                        executeInstantAutoApproval(detectedBankUtr);
                        break;
                    }
                }
            }
        } catch (err) {
            console.error(err);
        }
    }, 3000);
}

async function executeInstantAutoApproval(bankUtr) {
    try {
        await set(ref(db, `user_requests/${currentTrackingKey}/status`), "approved");
        await set(ref(db, `user_requests/${currentTrackingKey}/utr`), bankUtr);

        const balanceSnap = await get(ref(db, `user_wallet/${uid}/balance`));
        let oldBalance = balanceSnap.exists() ? parseFloat(balanceSnap.val()) : 0;
        let finalUpdatedBalance = oldBalance + pureBaseAmount;
        
        await set(ref(db, `user_wallet/${uid}/balance`), finalUpdatedBalance);

        document.getElementById('pop-txnid').innerText = currentTrackingKey;
        document.getElementById('pop-amt').innerText = `₹${pureBaseAmount}.00`;
        document.getElementById('successScreen').style.display = 'flex';

    } catch(e) {
        console.error(e);
    }
}

window.dismissSuccessPopup = () => {
    document.getElementById('successScreen').style.display = 'none';
    document.getElementById("amount").value = "";
    document.getElementById("qrBox").innerHTML = "";
    document.getElementById("paisaNotice").style.display = "none";
    document.getElementById("dynamic-verification-status").style.display = "none";
    document.getElementById("timerContainer").style.display = "none";
};
</script>
</body>
</html>
