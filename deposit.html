<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deposit | Luxury Royale</title>
    <style>
        :root { --gold: #d4af37; --sky: #00d2ff; --white: #ffffff; }
        body { background: #fdfdfd; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; text-align: center; }
        .card { background: var(--white); border-radius: 30px; padding: 30px; max-width: 400px; margin: auto; box-shadow: 0 20px 40px rgba(0,0,0,0.05); border: 1px solid #f0f0f0; }
        h2 { color: var(--gold); font-weight: 800; text-transform: uppercase; letter-spacing: 2px; }
        #qrBox img { width: 230px; border-radius: 20px; border: 5px solid var(--gold); padding: 10px; background: white; box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2); }
        input { width: 100%; padding: 15px; margin: 15px 0; border-radius: 12px; border: 2px solid #eee; box-sizing: border-box; font-size: 16px; outline: none; font-weight: 600; }
        .btn-sky { width: 100%; padding: 18px; border-radius: 15px; border: none; background: var(--sky); color: white; font-weight: 800; cursor: pointer; font-size: 16px; box-shadow: 0 8px 20px rgba(0, 210, 255, 0.3); }
        .row { display: flex; justify-content: space-between; padding: 12px; background: #fff; border-radius: 10px; margin-top: 10px; border: 1px solid #f5f5f5; font-size: 14px; }
    </style>
</head>
<body>
<div class="card">
    <h2>Add Cash</h2>
    <div id="qrBox"><p style="color:#aaa;">Enter amount to see QR</p></div>
    <input type="number" id="amt" placeholder="Enter Amount (Min ₹100)" oninput="generateUserQR()">
    <div id="payFields" style="display:none;">
        <input type="text" id="utr" placeholder="Enter 12-Digit UTR" maxlength="12">
        <button class="btn-sky" onclick="submitToAdmin()">SUBMIT PAYMENT</button>
    </div>
    <div id="userHistory" style="margin-top:20px;"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, push, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyAzfvbiqRqsQwBOOIkegxJD09di-S_tfHg", 
        authDomain: "test-eb5e7.firebaseapp.com", 
        databaseURL: "https://test-eb5e7-default-rtdb.firebaseio.com", 
        projectId: "test-eb5e7", 
        appId: "1:366282855653:web:dca7e000f5a22fb11f300c" 
    };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let ADMIN_UPI = "";
    const MY_UID = "user_01"; 

    onValue(ref(db, "settings/admin_upi"), (s) => { if(s.exists()) ADMIN_UPI = s.val(); });

    window.generateUserQR = () => {
        const a = document.getElementById('amt').value;
        if(a >= 100 && ADMIN_UPI) {
            document.getElementById('qrBox').innerHTML = `<img src="https://api.qrserver.com/v1/create-qr-code/?data=${encodeURIComponent('upi://pay?pa='+ADMIN_UPI+'&am='+a+'&cu=INR')}">`;
            document.getElementById('payFields').style.display = 'block';
        }
    };

    window.submitToAdmin = () => {
        const u = document.getElementById('utr').value;
        const a = document.getElementById('amt').value;
        if(u.length < 12) return alert("Invalid UTR!");
        push(ref(db, "user_requests"), { uid: MY_UID, amount: parseFloat(a), utr: u, status: "pending", time: serverTimestamp() });
        alert("Request Sent to Admin!");
    };

    onValue(ref(db, "user_requests"), (s) => {
        let h = "";
        s.forEach(c => { if(c.val().uid === MY_UID) h += `<div class="row"><span>₹${c.val().amount}</span><b>${c.val().status}</b></div>`; });
        document.getElementById('userHistory').innerHTML = h;
    });
</script>
</body>
</html>
