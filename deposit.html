<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>User Deposit Panel</title>

<style>

:root{
    --white:#ffffff;
    --light:#f5f7fb;
    --border:#e5e7eb;
    --text:#111827;
    --gray:#6b7280;
    --green:#22c55e;
    --red:#ef4444;
    --blue:#2563eb;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:linear-gradient(135deg,#eff6ff,#f8fafc);
    min-height:100vh;
    padding:20px;
}

.card{
    max-width:430px;
    margin:auto;
    background:white;
    border-radius:28px;
    padding:25px;
    box-shadow:0 10px 40px rgba(0,0,0,0.08);
}

h2{
    text-align:center;
    font-size:28px;
    font-weight:800;
    color:#111827;
}

.sub{
    text-align:center;
    color:#6b7280;
    margin-top:6px;
    margin-bottom:20px;
}

.balanceBox{
    background:#111827;
    color:white;
    padding:18px;
    border-radius:20px;
    text-align:center;
    margin-bottom:20px;
}

.balanceLabel{
    font-size:13px;
    opacity:0.7;
}

.balanceAmount{
    font-size:30px;
    font-weight:900;
    margin-top:5px;
}

.profile{
    display:flex;
    gap:10px;
    justify-content:center;
    flex-wrap:wrap;
    margin-bottom:20px;
}

.badge{
    background:#f3f4f6;
    padding:8px 14px;
    border-radius:30px;
    font-size:12px;
    font-weight:700;
}

.limitBox{
    background:#f9fafb;
    border:1px solid #eee;
    padding:15px;
    border-radius:16px;
    margin-bottom:15px;
    font-size:14px;
    color:#374151;
}

input{
    width:100%;
    padding:16px;
    border-radius:15px;
    border:2px solid var(--border);
    margin-top:12px;
    outline:none;
    font-size:15px;
    font-weight:600;
}

input:focus{
    border-color:var(--blue);
}

button{
    width:100%;
    padding:16px;
    border:none;
    border-radius:15px;
    background:var(--blue);
    color:white;
    font-size:15px;
    font-weight:800;
    cursor:pointer;
    margin-top:14px;
}

#qrBox{
    text-align:center;
    margin-top:20px;
}

#qrBox img{
    width:240px;
    background:white;
    padding:14px;
    border-radius:25px;
    border:1px solid #eee;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.historyTitle{
    margin-top:30px;
    margin-bottom:15px;
    font-size:18px;
    font-weight:800;
    color:#111827;
}

.row{
    background:white;
    border:1px solid #eee;
    border-radius:20px;
    padding:15px;
    margin-bottom:12px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.left{
    text-align:left;
}

.amount{
    font-size:20px;
    font-weight:900;
    color:#111827;
}

.small{
    font-size:11px;
    color:#9ca3af;
    margin-top:4px;
}

.notice{
    color:var(--red);
    margin-top:8px;
    font-size:12px;
    font-weight:700;
}

.status{
    display:flex;
    align-items:center;
    gap:8px;
    font-weight:800;
    font-size:13px;
}

.dot{
    width:12px;
    height:12px;
    border-radius:50%;
}

.green{
    background:var(--green);
    box-shadow:0 0 12px rgba(34,197,94,0.7);
}

.red{
    background:var(--red);
    box-shadow:0 0 12px rgba(239,68,68,0.7);
}

.blue{
    background:var(--blue);
    box-shadow:0 0 12px rgba(37,99,235,0.7);
}

#regOverlay{
    position:fixed;
    inset:0;
    background:white;
    z-index:999;
    display:none;
    align-items:center;
    justify-content:center;
    padding:20px;
}

.empty{
    text-align:center;
    color:#9ca3af;
    padding:20px;
}

</style>
</head>

<body>

<!-- REGISTER -->

<div id="regOverlay">

<div class="card">

<h2>Verify Account</h2>

<p class="sub">
Link your email and mobile number
</p>

<input type="email"
id="regEmail"
placeholder="Email Address">

<input type="number"
id="regPhone"
placeholder="10 Digit Mobile Number">

<button onclick="registerUser()">
LINK ACCOUNT
</button>

</div>

</div>



<!-- MAIN -->

<div class="card">

<h2>Add Cash</h2>

<p class="sub">
Fast & Secure Deposit
</p>



<!-- BALANCE -->

<div class="balanceBox">

<div class="balanceLabel">
Available Balance
</div>

<div class="balanceAmount">
₹<span id="userBalance">0</span>
</div>

</div>



<!-- PROFILE -->

<div class="profile">

<span id="displayMail"
class="badge">
Loading...
</span>

<span id="displayPhone"
class="badge">
...
</span>

</div>



<!-- LIMIT -->

<div class="limitBox">

Minimum Deposit:
<b>
₹<span id="minAmt">100</span>
</b>

<br><br>

Maximum Deposit:
<b>
₹<span id="maxAmt">50000</span>
</b>

</div>



<!-- QR -->

<div id="qrBox">

<p style="color:#9ca3af;">
Enter amount to generate QR
</p>

</div>



<!-- AMOUNT -->

<input type="number"
id="amt"
placeholder="Enter Amount"
oninput="generateUserQR()">



<!-- PAYMENT -->

<div id="payFields" style="display:none;">

<input type="text"
id="utr"
maxlength="12"
placeholder="Enter 12 Digit UTR">

<button onclick="submitToAdmin()">
SUBMIT PAYMENT
</button>

</div>



<!-- HISTORY -->

<div class="historyTitle">
Transaction History
</div>

<div id="userHistory"></div>

</div>



<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {

getDatabase,
ref,
onValue,
push,
set,
get,
serverTimestamp

} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";



// ======================
// FIREBASE CONFIG
// ======================

const firebaseConfig = {

apiKey: "AIzaSyAzfvbiqRqsQwBOOIkegxJD09di-S_tfHg",

authDomain: "test-eb5e7.firebaseapp.com",

databaseURL: "https://test-eb5e7-default-rtdb.firebaseio.com",

projectId: "test-eb5e7",

storageBucket: "test-eb5e7.appspot.com",

messagingSenderId: "366282855653",

appId: "1:366282855653:web:dca7e000f5a22fb11f300c",

measurementId: "G-ECKCTBLQJ8"

};



// ======================
// INIT
// ======================

const app =
initializeApp(firebaseConfig);

const db =
getDatabase(app);



// ======================
// USER ID
// ======================

const MY_UID = "user_01";



// ======================
// VARIABLES
// ======================

let ADMIN_UPI = "";

let MIN_AMOUNT = 100;

let MAX_AMOUNT = 50000;

let USER_DATA = {

email:"",
phone:""

};



// ======================
// CHECK USER
// ======================

async function checkRegistration(){

const snapshot =
await get(ref(db, `users/${MY_UID}`));

if(snapshot.exists()){

USER_DATA = snapshot.val();

document.getElementById('displayMail')
.innerText = USER_DATA.email;

document.getElementById('displayPhone')
.innerText = USER_DATA.phone;

document.getElementById('regOverlay')
.style.display = "none";

}else{

document.getElementById('regOverlay')
.style.display = "flex";

}

}

checkRegistration();



// ======================
// REGISTER USER
// ======================

window.registerUser = () => {

const email =
document.getElementById('regEmail').value;

const phone =
document.getElementById('regPhone').value;

if(!email.includes("@")){

return alert("Invalid Email");

}

if(phone.length != 10){

return alert("Invalid Mobile Number");

}

set(ref(db, `users/${MY_UID}`), {

email,
phone,
balance:0

}).then(()=>{

alert("Account Linked");

location.reload();

});

};



// ======================
// LOAD BALANCE
// ======================

onValue(ref(db, `users/${MY_UID}/balance`),

(snap)=>{

document.getElementById('userBalance')
.innerText = snap.val() || 0;

});



// ======================
// LOAD SETTINGS
// ======================

onValue(ref(db,"settings"),(snap)=>{

if(snap.exists()){

const d = snap.val();

ADMIN_UPI = d.admin_upi || "";

MIN_AMOUNT = d.min_amount || 100;

MAX_AMOUNT = d.max_amount || 50000;

document.getElementById('minAmt')
.innerText = MIN_AMOUNT;

document.getElementById('maxAmt')
.innerText = MAX_AMOUNT;

}

});



// ======================
// AUTO QR
// ======================

window.generateUserQR = () => {

const amount =
parseFloat(
document.getElementById('amt').value
);

if(!amount){

document.getElementById('qrBox').innerHTML =

`<p style="color:#9ca3af;">
Enter amount to generate QR
</p>`;

return;

}

if(amount < MIN_AMOUNT){

document.getElementById('qrBox').innerHTML =

`<p style="color:red;">
Minimum ₹${MIN_AMOUNT}
</p>`;

return;

}

if(amount > MAX_AMOUNT){

document.getElementById('qrBox').innerHTML =

`<p style="color:red;">
Maximum ₹${MAX_AMOUNT}
</p>`;

return;

}

if(ADMIN_UPI){

const upiLink =

`upi://pay?pa=${ADMIN_UPI}&pn=Deposit&am=${amount}&cu=INR`;

document.getElementById('qrBox').innerHTML =

`<img src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(upiLink)}">`;

document.getElementById('payFields')
.style.display = "block";

}

};



// ======================
// SUBMIT PAYMENT
// ======================

window.submitToAdmin = () => {

const utr =
document.getElementById('utr').value;

const amount =
parseFloat(
document.getElementById('amt').value
);

if(utr.length != 12){

return alert("Invalid UTR");

}

push(ref(db,"user_requests"),{

uid:MY_UID,

email:USER_DATA.email,

phone:USER_DATA.phone,

amount,

utr,

status:"pending",

notice:"",

time:Date.now()

});

alert("Payment Request Sent");

document.getElementById('utr').value = "";

};



// ======================
// HISTORY
// ======================

onValue(ref(db,"user_requests"),(snap)=>{

let html = "";

snap.forEach(c=>{

const d = c.val();

if(d.uid === MY_UID){

const date =

new Date(d.time || Date.now())
.toLocaleString();

let dot = "blue";

let text = "PENDING";

if(d.status === "approved"){

dot = "green";

text = "APPROVED";

}

if(d.status === "rejected"){

dot = "red";

text = "REJECTED";

}

html = `

<div class="row">

<div class="left">

<div class="amount">
₹${d.amount}
</div>

<div class="small">
UTR: ${d.utr}
</div>

<div class="small">
${date}
</div>

${d.notice ? `

<div class="notice">
Reason: ${d.notice}
</div>

` : ""}

</div>

<div class="status">

<div class="dot ${dot}"></div>

${text}

</div>

</div>

` + html;

}

});

document.getElementById('userHistory')
.innerHTML =

html ||

`<div class="empty">
No Transactions
</div>`;

});

</script>

</body>
</html>
