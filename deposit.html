<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <style>
        :root { --gold: #d4af37; --sky: #00d2ff; }
        body { background: #f8f9fa; font-family: sans-serif; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 20px; border: 1px solid #eee; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .stk-txt { font-size: 35px; font-weight: 900; color: var(--gold); }
        input { padding: 12px; width: 250px; border-radius: 10px; border: 1px solid #ddd; outline: none; }
        .btn-sky { background: var(--sky); color: white; border: none; padding: 12px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .req-box { border-bottom: 1px solid #eee; padding: 10px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div class="card">
    <h2>MY STOCK: <span id="stkVal" class="stk-txt">₹0</span></h2>
    <input type="text" id="newUpi" placeholder="example@ybl">
    <button class="btn-sky" onclick="saveAdminUpi()">UPDATE ADMIN UPI</button>
</div>

<div class="card">
    <h3>Buy Stock (Super Admin QR)</h3>
    <input type="number" id="buyAmt" placeholder="Amount" oninput="genSuperQR()">
    <div id="sqrContainer" style="margin:10px;"></div>
    <input type="text" id="adminUtr" placeholder="Enter UTR">
    <button class="btn-sky" style="background:var(--gold)" onclick="reqStock()">REQUEST REFILL</button>
</div>

<div class="card">
    <h3>User Requests</h3>
    <div id="uReqList"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, update, increment, push, serverTimestamp, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyAzfvbiqRqsQwBOOIkegxJD09di-S_tfHg", 
        authDomain: "test-eb5e7.firebaseapp.com", 
        databaseURL: "https://test-eb5e7-default-rtdb.firebaseio.com", 
        projectId: "test-eb5e7", 
        appId: "1:366282855653:web:dca7e000f5a22fb11f300c" 
    };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let SUPER_UPI = "";
    const AID = "admin_01";

    onValue(ref(db, "settings/super_upi"), s => { SUPER_UPI = s.val(); });
    onValue(ref(db, `admins/${AID}/stock`), s => { document.getElementById('stkVal').innerText = "₹" + (s.val() || 0); });

    window.saveAdminUpi = () => {
        update(ref(db, "settings"), { admin_upi: document.getElementById('newUpi').value });
        alert("Admin UPI Live!");
    };

    window.genSuperQR = () => {
        const a = document.getElementById('buyAmt').value;
        if(a > 0 && SUPER_UPI) document.getElementById('sqrContainer').innerHTML = `<img src="https://api.qrserver.com/v1/create-qr-code/?data=${encodeURIComponent('upi://pay?pa='+SUPER_UPI+'&am='+a)}" width="150">`;
    };

    window.reqStock = () => {
        push(ref(db, "stock_requests"), { adminId: AID, amount: parseFloat(document.getElementById('buyAmt').value), utr: document.getElementById('adminUtr').value, status: "pending", time: serverTimestamp() });
        alert("Request Sent!");
    };

    onValue(ref(db, "user_requests"), s => {
        let h = "";
        s.forEach(c => {
            const d = c.val();
            if(d.status === "pending") h += `<div class="req-box"><span>₹${d.amount}</span> <button class="btn-sky" style="background:green" onclick="approveUser('${c.key}','${d.uid}',${d.amount})">Approve</button></div>`;
        });
        document.getElementById('uReqList').innerHTML = h || "No requests";
    });

    window.approveUser = async (rid, uid, amt) => {
        const s = await get(ref(db, `admins/${AID}/stock`));
        if((s.val() || 0) < amt) return alert("Low Stock!");
        await update(ref(db, `admins/${AID}`), { stock: increment(-amt) });
        await update(ref(db, `user_wallet/${uid}`), { balance: increment(amt) });
        update(ref(db, `user_requests/${rid}`), { status: "approved" });
    };
</script>
</body>
</html>
