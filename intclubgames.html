<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Win Go 1Min - User Node</title>
    <style>
        :root { --red: #f44336; --green: #4caf50; --violet: #9c27b0; --big: #ffa000; --small: #2196f3; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; margin: 0; padding: 0; display: flex; justify-content: center; }
        .app-shell { width: 100%; max-width: 450px; background: #fff; min-height: 100vh; position: relative; box-shadow: 0 0 10px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        
        /* Layout elements matching image configs */
        .top-brand { background: #f44336; color: white; padding: 12px; font-weight: bold; text-align: center; font-size: 18px; }
        .wallet-banner { background: linear-gradient(135deg, #ff4d4d, #c62828); color: white; padding: 20px; text-align: center; }
        .timer-strip { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; background: #fff5f5; border-bottom: 1px solid #ffe0e0; font-weight: bold; }
        .countdown-clock { color: var(--red); font-size: 24px; font-variant-numeric: tabular-nums; }
        
        /* Grid definitions */
        .control-grid { padding: 10px; display: grid; gap: 10px; }
        .grid-3 { grid-template-columns: repeat(3, 1fr); }
        .grid-5 { grid-template-columns: repeat(5, 1fr); }
        .grid-2 { grid-template-columns: 1fr 1fr; }
        
        button.action-btn { padding: 14px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; font-size: 15px; transition: transform 0.1s; }
        button.action-btn:active { transform: scale(0.96); }
        .num-circle { background: #fff; color: #333; border: 1px solid #ddd; border-radius: 50%; aspect-ratio: 1; font-size: 18px; font-weight: bold; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        /* Premium Countdown overlay matching image_0c9a21.jpg */
        .freeze-mask { display: none; position: absolute; top: 135px; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.75); color: white; font-size: 140px; font-weight: bold; justify-content: center; align-items: center; z-index: 999; backdrop-filter: blur(2px); }
        .freeze-box { background: #f44336; padding: 20px 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); border: 4px solid #fff; line-height: 1; }
        
        /* Tabs and tables matching image_0c9a07.png */
        .tabs-header { display: flex; background: #eee; }
        .tab-btn { flex: 1; padding: 12px; text-align: center; font-weight: bold; background: #fafafa; cursor: pointer; border-bottom: 3px solid transparent; color: #666; }
        .tab-btn.active { background: #fff; border-bottom-color: #f44336; color: #f44336; }
        .tab-pane { display: none; }
        .tab-pane.active { display: block; }
        
        table { width: 100%; text-align: center; border-collapse: collapse; font-size: 14px; }
        th, td { padding: 12px 8px; border-bottom: 1px solid #eee; }
        th { background: #fcfcfc; color: #777; }
        .dot { height: 12px; width: 12px; border-radius: 50%; display: inline-block; margin: 0 2px; }

        /* Custom Animated Win/Loss Popups */
        .payout-alert { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.7); background: white; width: 300px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); z-index: 9999; text-align: center; padding: 25px; box-sizing: border-box; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); opacity: 0; }
        .payout-alert.pop-show { display: block; transform: translate(-50%, -50%) scale(1); opacity: 1; }
        .payout-title { font-size: 24px; font-weight: bold; margin-bottom: 10px; }
        .alert-win { color: var(--green); }
        .alert-loss { color: var(--red); }
        .payout-msg { font-size: 16px; margin-bottom: 20px; color: #444; }
        .btn-close-pop { background: #333; color: white; padding: 10px 25px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="app-shell">
    <!-- Big 5-second lock container -->
    <div class="freeze-mask" id="freeze-screen">
        <div class="freeze-box" id="freeze-timer-display">05</div>
    </div>

    <div class="top-brand">INT CLUB</div>
    
    <div class="wallet-banner">
        <div style="font-size:14px; opacity:0.9;">Wallet Balance</div>
        <div style="font-size:32px; font-weight:bold; margin-top:5px;">₹<span id="wallet-balance-view">1000.00</span></div>
    </div>

    <div class="timer-strip">
        <div>Period:<br><span id="period-num-view" style="font-size:15px; color:#111;">Loading...</span></div>
        <div>
            <div style="font-size:11px; color:#777; text-align:right;">Time remaining</div>
            <div class="countdown-clock" id="clock-countdown-view">01:00</div>
        </div>
    </div>

    <!-- Bet Entry Grids -->
    <div class="control-grid grid-3">
        <button class="action-btn bg-green" onclick="handleBetPlacement('Green')">Green</button>
        <button class="action-btn bg-violet" onclick="handleBetPlacement('Violet')">Violet</button>
        <button class="action-btn bg-red" onclick="handleBetPlacement('Red')">Red</button>
    </div>

    <div class="control-grid grid-5">
        <button class="num-circle" onclick="handleBetPlacement('0')" style="color:var(--red); border-color:var(--violet);">0</button>
        <button class="num-circle" onclick="handleBetPlacement('1')" style="color:var(--green);">1</button>
        <button class="num-circle" onclick="handleBetPlacement('2')" style="color:var(--red);">2</button>
        <button class="num-circle" onclick="handleBetPlacement('3')" style="color:var(--green);">3</button>
        <button class="num-circle" onclick="handleBetPlacement('4')" style="color:var(--red);">4</button>
        <button class="num-circle" onclick="handleBetPlacement('5')" style="color:var(--green); border-color:var(--violet);">5</button>
        <button class="num-circle" onclick="handleBetPlacement('6')" style="color:var(--red);">6</button>
        <button class="num-circle" onclick="handleBetPlacement('7')" style="color:var(--green);">7</button>
        <button class="num-circle" onclick="handleBetPlacement('8')" style="color:var(--red);">8</button>
        <button class="num-circle" onclick="handleBetPlacement('9')" style="color:var(--green);">9</button>
    </div>

    <div class="control-grid grid-2">
        <button class="action-btn bg-big" onclick="handleBetPlacement('Big')">Big (5-9)</button>
        <button class="action-btn bg-small" onclick="handleBetPlacement('Small')">Small (0-4)</button>
    </div>

    <!-- Active Staged Bets Dashboard Tracker -->
    <div style="padding:10px 15px; background:#fffde7; margin:10px; border-radius:8px; border:1px solid #f5ecb9; font-size:13px;">
        <strong>Your Cumulative Active Staged Bets:</strong>
        <div id="staged-bets-list" style="margin-top:5px; color:#555;">No options chosen yet.</div>
    </div>

    <!-- Logs section -->
    <div class="tabs-header">
        <div class="tab-btn active" onclick="toggleDisplayTab('game-history-pane', this)">Game history</div>
        <div class="tab-btn" onclick="toggleDisplayTab('my-transactions-pane', this)">My Bets</div>
    </div>

    <div id="game-history-pane" class="tab-pane active">
        <table>
            <thead><tr><th>Period</th><th>Number</th><th>Big Small</th><th>Color</th></tr></thead>
            <tbody id="global-history-rows"></tbody>
        </table>
    </div>

    <div id="my-transactions-pane" class="tab-pane">
        <table>
            <thead><tr><th>Period</th><th>Bet Choice</th><th>Amount</th><th>Status</th></tr></thead>
            <tbody id="personal-transactions-rows"></tbody>
        </table>
    </div>
</div>

<!-- Dynamic Custom Popups Structure -->
<div class="payout-alert" id="custom-pop">
    <div class="payout-title" id="pop-title">Result</div>
    <div class="payout-msg" id="pop-msg">Message body details</div>
    <button class="btn-close-pop" onclick="dismissCustomPopup()">OK</button>
</div>

<!-- Firebase SDK Infrastructure bundles -->
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
  apiKey: "AIzaSyAzfvbiqRqsQwBOOIkegxJD09di-S_tfHg",
  authDomain: "test-eb5e7.firebaseapp.com",
  databaseURL: "https://test-eb5e7-default-rtdb.firebaseio.com",
  projectId: "test-eb5e7",
  storageBucket: "test-eb5e7.appspot.com",
  messagingSenderId: "366282855653",
  appId: "1:366282855653:web:dca7e000f5a22fb11f300c",
  measurementId: "G-ECKCTBLQJ8"
};
    firebase.initializeApp(firebaseConfig);
    const databaseRef = firebase.database();

    let walletBalance = 1000.00;
    let localPeriodPointer = "";
    let continuousBetAccumulator = {}; 
    let uniqueUserSessionKey = "UID_" + Math.floor(10000 + Math.random() * 90000);
    let historicalTransactionsTracker = [];

    // Master Synchronization Engine Listener
    databaseRef.ref('server_state').on('value', snapshot => {
        if(!snapshot.exists()) return;
        let remoteState = snapshot.val();
        
        localPeriodPointer = remoteState.period;
        document.getElementById("period-num-view").innerText = localPeriodPointer;

        let secondsRemaining = remoteState.timeLeft;
        let minsPrint = Math.floor(secondsRemaining / 60);
        let secsPrint = secondsRemaining % 60;
        document.getElementById("clock-countdown-view").innerText = 
            `0${minsPrint}:${secsPrint < 10 ? '0' + secsPrint : secsPrint}`;

        // Freeze overlay execution loop (Matches image_0c9a21.jpg)
        if(secondsRemaining <= 5) {
            document.getElementById("freeze-screen").style.display = "flex";
            document.getElementById("freeze-timer-display").innerText = `0${secondsRemaining}`;
        } else {
            document.getElementById("freeze-screen").style.display = "none";
        }
    });

    function handleBetPlacement(targetKey) {
        let entryAmount = parseInt(prompt(`Enter Bet Amount for [ ${targetKey} ] :`, "10"));
        if(isNaN(entryAmount) || entryAmount <= 0) return;
        if(entryAmount > walletBalance) { alert("Insufficient Wallet Balance!"); return; }

        walletBalance -= entryAmount;
        document.getElementById("wallet-balance-view").innerText = walletBalance.toFixed(2);

        // Safe Accumulation logic: adds up consecutive inputs on the same key
        if(continuousBetAccumulator[targetKey]) {
            continuousBetAccumulator[targetKey] += entryAmount;
        } else {
            continuousBetAccumulator[targetKey] = entryAmount;
        }

        // Push immediately to the unified pool node for admin review
        databaseRef.ref(`live_pools/${localPeriodPointer}/${uniqueUserSessionKey}/${targetKey}`).set(continuousBetAccumulator[targetKey]);
        refreshStagedBetsInterface();
    }

    function refreshStagedBetsInterface() {
        let container = document.getElementById("staged-bets-list");
        container.innerHTML = "";
        let selectionKeys = Object.keys(continuousBetAccumulator);
        if(selectionKeys.length === 0) { container.innerHTML = "No options chosen yet."; return; }
        selectionKeys.forEach(k => {
            container.innerHTML += `<div>🎯 <b>${k}</b>: ₹${continuousBetAccumulator[k]}</div>`;
        });
    }

    // Dynamic Historical Processing Chain Node
    databaseRef.ref('wingo_history').limitToLast(1).on('child_added', snap => {
        let lastDrawOutcome = snap.val();
        if(!lastDrawOutcome || lastDrawOutcome.period !== localPeriodPointer) return;

        let totalWinPayoutAccumulated = 0;
        let roundBetRegistered = false;

        Object.keys(continuousBetAccumulator).forEach(betKey => {
            roundBetRegistered = true;
            let stakedCash = continuousBetAccumulator[betKey];
            let isWinner = false;
            let multFactor = 1.92;

            if(betKey === lastDrawOutcome.number.toString()) { isWinner = true; multFactor = 8.8; }
            else if(betKey === lastDrawOutcome.size) { isWinner = true; multFactor = 1.92; }
            else if(lastDrawOutcome.color.includes(betKey)) { isWinner = true; multFactor = (betKey === 'Violet') ? 4.5 : 1.92; }

            let outcomeString = "";
            if(isWinner) {
                let gain = stakedCash * multFactor;
                totalWinPayoutAccumulated += gain;
                outcomeString = `<span style="color:var(--green); font-weight:bold;">+₹${gain.toFixed(2)}</span>`;
            } else {
                outcomeString = `<span style="color:var(--red); font-weight:bold;">-₹${stakedCash.toFixed(2)}</span>`;
            }

            historicalTransactionsTracker.unshift({
                period: lastDrawOutcome.period,
                choice: betKey,
                amt: stakedCash,
                statusView: outcomeString
            });
        });

        if(roundBetRegistered) {
            if(totalWinPayoutAccumulated > 0) {
                walletBalance += totalWinPayoutAccumulated;
                triggerAnimatedPopup("WINNER! 🎉", `Congratulations! You won +₹${totalWinPayoutAccumulated.toFixed(2)}`, true);
            } else {
                triggerAnimatedPopup("LOSS 😢", "Better luck next round!", false);
            }
            renderPersonalTransactionsTable();
        }

        continuousBetAccumulator = {};
        refreshStagedBetsInterface();
        document.getElementById("wallet-balance-view").innerText = walletBalance.toFixed(2);
    });

    function triggerAnimatedPopup(title, msg, isWin) {
        let el = document.getElementById("custom-pop");
        let tEl = document.getElementById("pop-title");
        let mEl = document.getElementById("pop-msg");
        
        tEl.className = "payout-title " + (isWin ? "alert-win" : "alert-loss");
        tEl.innerText = title;
        mEl.innerText = msg;
        
        el.classList.add("pop-show");
    }

    function dismissCustomPopup() {
        document.getElementById("custom-pop").classList.remove("pop-show");
    }

    function renderPersonalTransactionsTable() {
        let body = document.getElementById("personal-transactions-rows");
        body.innerHTML = "";
        historicalTransactionsTracker.forEach(t => {
            body.innerHTML += `<tr><td>${t.period}</td><td><b>${t.choice}</b></td><td>₹${t.amt}</td><td>${t.statusView}</td></tr>`;
        });
    }

    // Global Feed View Sync (Matches image_0c9a07.png formatting parameters)
    databaseRef.ref('wingo_history').limitToLast(12).on('value', snap => {
        let body = document.getElementById("global-history-rows");
        body.innerHTML = "";
        let records = [];
        snap.forEach(c => { records.unshift(c.val()); });
        records.forEach(r => {
            let dots = "";
            if(r.color.includes("Red")) dots += `<span class="dot" style="background:var(--red)"></span>`;
            if(r.color.includes("Green")) dots += `<span class="dot" style="background:var(--green)"></span>`;
            if(r.color.includes("Violet")) dots += `<span class="dot" style="background:var(--violet)"></span>`;

            body.innerHTML += `<tr>
                <td>${r.period}</td>
                <td style="font-weight:bold; color:${r.color.includes('Red')?'var(--red)':'var(--green)'}">${r.number}</td>
                <td>${r.size}</td>
                <td>${dots}</td>
            </tr>`;
        });
    });

    function toggleDisplayTab(paneId, btnEl) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
        btnEl.classList.add('active');
        document.getElementById(paneId).classList.add('active');
    }
</script>
</body>
</html>
