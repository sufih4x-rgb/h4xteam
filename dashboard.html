<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | DOT GAMES</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4361ee; --secondary: #3f37c9; --success: #06d6a0; --danger: #ef476f; --bg: #f8f9fc; --surface: #ffffff; --text-main: #2b2d42; --text-muted: #8d99ae; }
        body { background: var(--bg); color: var(--text-main); font-family: 'Inter', sans-serif; margin: 0; display: flex; justify-content: center; overflow-x: hidden; }
        .app-shell { width: 100%; max-width: 480px; min-height: 100vh; background: var(--surface); position: relative; padding-bottom: 80px; box-shadow: 0 0 20px rgba(0,0,0,0.05); }
        
        /* Ticker Styling */
        .ticker-wrap { background: #111; color: #00ff88; padding: 8px 0; font-size: 11px; font-weight: 700; overflow: hidden; white-space: nowrap; border-bottom: 1px solid #222; }
        .ticker-move { display: inline-block; animation: tickerMove 80s linear infinite; }
        @keyframes tickerMove { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .ticker-item { display: inline-block; margin-right: 40px; }
        
        /* UI Components */
        .ping { width: 10px; height: 10px; background: var(--success); border-radius: 50%; display: inline-block; position: relative; }
        .ping::after { content: ''; position: absolute; inset: 0; background: var(--success); border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(3.5); opacity: 0; } }
        
        .top-nav { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .menu-icon { font-size: 24px; cursor: pointer; background: #f1f5f9; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; border-radius: 12px; }
        
        .wallet-card { margin: 10px 20px; padding: 25px; background: linear-gradient(135deg, var(--primary), var(--secondary)); border-radius: 24px; color: white; position: relative; overflow: hidden; }
        .balance-val { font-size: 40px; font-weight: 800; margin: 10px 0; display: block; }
        
        #secretVault { display: none; margin: 15px 20px; padding: 15px; background: #f1f5f9; border-radius: 18px; border: 1px dashed #cbd5e1; }
        .vault-title { font-size: 10px; font-weight: 800; color: #64748b; letter-spacing: 1px; }
        .v-input-group { display: flex; gap: 8px; margin-top: 10px; }
        .v-input-group input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 12px; font-size: 13px; outline: none; font-weight: 600; }
        .v-btn-sec { padding: 10px 15px; border-radius: 12px; border: none; font-size: 10px; font-weight: 800; cursor: pointer; }
        .btn-save { background: var(--primary); color: white; }
        .btn-get { background: #64748b; color: white; }

        .action-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 25px 20px; }
        .action-item { display: flex; flex-direction: column; align-items: center; gap: 8px; text-decoration: none; text-align: center; }
        .icon-circle { width: 55px; height: 55px; background: #fff; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 8px 20px rgba(0,0,0,0.06); }
        .action-item span { font-size: 9px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; }

        .lead-card { background: #fff; border-radius: 20px; border: 1px solid #f0f2f5; overflow: hidden; margin-top: 10px; }
        .lead-item { display: flex; align-items: center; padding: 12px 15px; border-bottom: 1px solid #f8fafc; }
        .lead-rank { width: 25px; font-weight: 900; font-size: 14px; }
        .rank-1 { color: #facc15; } .rank-2 { color: #94a3b8; } .rank-3 { color: #b45309; }
        .lead-avatar { width: 32px; height: 32px; border-radius: 8px; background: var(--bg); margin: 0 12px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 12px; }
        .lead-info { flex: 1; }
        .lead-name { font-size: 13px; font-weight: 700; }
        .lead-win { font-size: 11px; color: var(--success); font-weight: 800; }

        .game-card { width: 100%; padding: 15px; background: #fff; border: 1px solid #f0f2f5; border-radius: 20px; display: flex; align-items: center; justify-content: space-between; text-decoration: none; color: inherit; margin-bottom: 12px; box-sizing: border-box; }
        .game-img-box { width: 65px; height: 65px; background: #f8f9fc; border-radius: 15px; overflow: hidden; }
        .game-img-box img { width: 100%; height: 100%; object-fit: cover; }
        .btn-all-games { width: 100%; padding: 18px; border-radius: 20px; background: linear-gradient(90deg, #4361ee, #3f37c9); color: white; font-weight: 800; text-align: center; text-decoration: none; display: block; box-sizing: border-box; }

        #chat-float-btn { position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; background: var(--primary); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; z-index: 3000; }
        #chat-window { position: fixed; bottom: 90px; right: 20px; width: 300px; height: 400px; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: none; flex-direction: column; z-index: 3000; overflow: hidden; }
        .sidebar { position: fixed; top: 0; left: -100%; width: 80%; max-width: 300px; height: 100%; background: white; z-index: 2000; transition: 0.3s; padding: 20px; box-sizing: border-box; }
        .sidebar.active { left: 0; }
        .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1999; }
        .sidebar-overlay.active { display: block; }
    </style>
</head>
<body>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<div class="sidebar" id="sidebar">
    <div style="text-align: center; margin-bottom: 30px;">
        <div id="avatarLarge" style="width: 70px; height: 70px; background: var(--primary); color:white; border-radius: 50%; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 800;">U</div>
        <h2 id="sideName" style="margin: 0; font-size: 18px;">User</h2>
        <p id="sideEmail" style="color: var(--text-muted); font-size: 11px;">loading...</p>
    </div>
    <button style="width:100%; padding:12px; margin-bottom:10px; text-align:left; border:none; background:#f8fafc; font-weight:600; border-radius:10px;" onclick="location.href='profile.html'">👤 My Profile</button>
    <button style="width:100%; padding:12px; margin-bottom:10px; text-align:left; border:none; background:#f8fafc; font-weight:600; border-radius:10px;" onclick="location.href='invite.html'">🤝 Refer & Earn</button>
    <button style="width:100%; padding:12px; margin-bottom:10px; text-align:left; border:none; background:#f8fafc; font-weight:600; border-radius:10px;" onclick="location.href='withdraw.html'">📤 Withdraw</button>
    <button style="width:100%; padding:12px; margin-bottom:10px; text-align:left; border:none; background:#fff1f2; color:var(--danger); font-weight:600; border-radius:10px;" onclick="logout()">Logout</button>
</div>

<div id="chat-float-btn" onclick="toggleChat()">💬</div>
<div id="chat-window">
    <div style="background:var(--primary); color:white; padding:15px; font-weight:700; display:flex; justify-content:space-between;">
        <span>Admin Support</span>
        <span onclick="toggleChat()" style="cursor:pointer">✕</span>
    </div>
    <div id="chat-messages" style="flex:1; padding:10px; overflow-y:auto; background:#f9f9f9; display:flex; flex-direction:column; gap:8px;"></div>
    <div style="padding:10px; display:flex; gap:5px; border-top:1px solid #eee;">
        <input type="text" id="chat-input" placeholder="Ask anything...">
        <button id="send-chat" style="background:var(--primary); color:white; border:none; padding:8px 15px; border-radius:20px;">Send</button>
    </div>
</div>

<div class="app-shell">
    <div class="ticker-wrap"><div class="ticker-move" id="tickerContent"></div></div>

    <div class="top-nav">
        <div class="menu-icon" onclick="toggleSidebar()">☰</div>
        <div style="font-weight: 800; font-size: 20px; letter-spacing: -1px;">H4X<span style="color:var(--primary)">TEAM</span></div>
        <div id="userAvatarSmall" style="width: 35px; height: 35px; border-radius: 10px; background: var(--primary); color: white; display: flex; align-items: center; justify-content: center; font-weight: 800; cursor: pointer;">U</div>
    </div>

    <div class="wallet-card">
        <div style="display:flex; align-items:center; gap:8px;"><div class="ping"></div><span style="font-size: 10px; font-weight: 700;">LIVE BALANCE</span></div>
        <span class="balance-val">₹<span id="mainBal">0.00</span></span>
        <div style="display: flex; justify-content: space-between; font-size: 10px; font-weight: 700;">
            <span>UID: <span id="mainUid">...</span></span>
            <span onclick="triggerSecretVault()" style="background: #facc15; color: #000; padding: 2px 8px; border-radius: 10px; cursor: pointer;">VIP LEVEL <span id="vipLevelDisplay">0</span></span>
        </div>
    </div>

    <div id="secretVault">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <span class="vault-title">🛡️ SYSTEM CLOUD STORAGE</span>
            <span id="vaultBal" style="font-weight: 900; font-size: 13px; color: #1e293b;">₹0.00</span>
        </div>
        <div class="v-input-group">
            <input type="number" id="vAmount" placeholder="Amount">
            <button class="v-btn-sec btn-save" onclick="moveMoney('deposit')">STORE</button>
            <button class="v-btn-sec btn-get" onclick="moveMoney('withdraw')">RECALL</button>
        </div>
    </div>

    <div class="action-grid">
        <a href="deposit.html" class="action-item"><div class="icon-circle">📥</div><span>Deposit</span></a>
        <a href="withdraw.html" class="action-item"><div class="icon-circle">📤</div><span>Withdraw</span></a>
        <a href="recharge.html" class="action-item"><div class="icon-circle">💸</div><span>Recharge</span></a>
        <a href="invite.html" class="action-item"><div class="icon-circle">🤝</div><span>Invite</span></a>
    </div>

    <div style="padding: 0 20px; margin-bottom: 25px;">
        <h3 style="font-size: 15px; margin-bottom:10px;">🏆 Top Winners</h3>
        <div id="leaderboardList" class="lead-card"></div>
    </div>

    <div style="padding: 0 20px;">
        <h3 style="font-size: 15px; margin-bottom: 12px;">🔥 Popular Games</h3>
        <a href="game.html" class="game-card" style="border-left: 4px solid var(--primary);">
            <div><h4 style="margin:0; font-size:14px;">Color Prediction</h4><p style="margin:3px 0 0; font-size:10px; color:var(--text-muted);">Predict & Win 2X</p></div>
            <div class="game-img-box"><img src="https://firebasestorage.googleapis.com/v0/b/test-eb5e7.appspot.com/o/unnamed.jpg?alt=media&token=e9f5c3a0-ccc5-4859-abd5-e7cefe3189e7"></div>
        </a>
        <a href="allgames.html" class="btn-all-games">EXPLORE ALL GAMES ✨</a>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, onValue, push, set, serverTimestamp, update, increment, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyAzfvbiqRqsQwBOOIkegxJD09di-S_tfHg", 
        authDomain: "test-eb5e7.firebaseapp.com", 
        databaseURL: "https://test-eb5e7-default-rtdb.firebaseio.com", 
        projectId: "test-eb5e7", 
        appId: "1:366282855653:web:dca7e000f5a22fb11f300c" 
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    // --- MAIN DATA SYNC ---
    onAuthStateChanged(auth, user => {
        if (!user) return location.href = 'index.html';
        const uid = user.uid;

        // 1. Sync Live Balance
        onValue(ref(db, `user_wallet/${uid}/balance`), (snap) => {
            const bal = snap.val() || 0;
            document.getElementById('mainBal').innerText = parseFloat(bal).toFixed(2);
        });

        // 2. Sync User Info & Vault
        onValue(ref(db, `users/${uid}`), (snap) => {
            const d = snap.val() || {};
            if(d.isBanned === true) { signOut(auth); location.href = 'index.html'; }

            document.getElementById('vaultBal').innerText = "₹" + (d.vault_balance || 0).toFixed(2);
            document.getElementById('mainUid').innerText = uid.substring(0,8).toUpperCase();
            document.getElementById('sideName').innerText = d.displayName || user.email.split('@')[0];
            document.getElementById('sideEmail').innerText = user.email;
            document.getElementById('vipLevelDisplay').innerText = d.vip || 0;
            document.getElementById('userAvatarSmall').innerText = (d.displayName || 'U').charAt(0).toUpperCase();
        });

        // 3. Vault Logic (Updated to move money from user_wallet)
        window.moveMoney = async (type) => {
            const amt = parseFloat(document.getElementById('vAmount').value);
            if(!amt || amt <= 0) return;

            const walletSnap = await get(ref(db, `user_wallet/${uid}/balance`));
            const userSnap = await get(ref(db, `users/${uid}/vault_balance`));
            
            let curBal = walletSnap.val() || 0;
            let curVault = userSnap.val() || 0;

            if (type === 'deposit') {
                if (curBal >= amt) {
                    await update(ref(db, `user_wallet/${uid}`), { balance: increment(-amt) });
                    await update(ref(db, `users/${uid}`), { vault_balance: increment(amt) });
                } else { alert("Insufficient Balance!"); }
            } else {
                if (curVault >= amt) {
                    await update(ref(db, `users/${uid}`), { vault_balance: increment(-amt) });
                    await update(ref(db, `user_wallet/${uid}`), { balance: increment(amt) });
                } else { alert("Vault is Empty!"); }
            }
            document.getElementById('vAmount').value = '';
        };

        // Chat Logic
        onValue(ref(db, `admin_chats/${uid}`), (snapshot) => {
            const chatDiv = document.getElementById('chat-messages');
            chatDiv.innerHTML = '';
            snapshot.forEach(c => {
                const m = c.val();
                const div = document.createElement('div');
                div.style = `padding:8px; border-radius:10px; font-size:12px; max-width:80%; ${m.role==='user'?'background:var(--primary); color:white; align-self:flex-end;':'background:#eee; align-self:flex-start;'}`;
                div.innerText = m.text;
                chatDiv.appendChild(div);
            });
            chatDiv.scrollTop = chatDiv.scrollHeight;
        });

        document.getElementById('send-chat').onclick = () => {
            const txt = document.getElementById('chat-input').value;
            if(txt) {
                push(ref(db, `admin_chats/${uid}`), { text: txt, role: 'user', timestamp: serverTimestamp() });
                document.getElementById('chat-input').value = '';
            }
        };
    });

    // Helper UI Functions
    window.toggleSidebar = () => {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('sidebarOverlay').classList.toggle('active');
    };
    window.toggleChat = () => {
        const c = document.getElementById('chat-window');
        c.style.display = c.style.display === 'flex' ? 'none' : 'flex';
    };
    window.logout = () => signOut(auth).then(() => location.href = 'index.html');
    
    let clickCount = 0;
    window.triggerSecretVault = () => {
        clickCount++;
        if (clickCount === 3) {
            const v = document.getElementById('secretVault');
            v.style.display = (v.style.display === 'block') ? 'none' : 'block';
            clickCount = 0;
        }
        setTimeout(() => { clickCount = 0; }, 2000);
    };

    // Leaderboard
    onValue(ref(db, 'users'), snap => {
        const users = snap.val() || {};
        const fakeData = [{ name: "Suresh_8**", win: 92450 }, { name: "Ankit_7**", win: 81200 }];
        let combined = [...fakeData].sort((a, b) => b.win - a.win);
        let html = "";
        combined.forEach((u, i) => {
            html += `<div class="lead-item"><div class="lead-rank">${i+1}</div><div class="lead-avatar">${u.name[0]}</div><div class="lead-info"><span class="lead-name">${u.name}</span><span class="lead-win">Win: ₹${u.win}</span></div></div>`;
        });
        document.getElementById('leaderboardList').innerHTML = html;
    });
</script>
</body>
</html>
