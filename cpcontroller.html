<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin | INT Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4361ee; --bg: #0f172a; --card: #1e293b; --white: #ffffff; --success: #10b981; --danger: #ef4444; --warning: #f59e0b; }
        body { background: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; color: var(--white); margin: 0; padding: 20px; }
        
        .admin-header { display: flex; justify-content: space-between; align-items: center; background: var(--card); padding: 20px; border-radius: 20px; margin-bottom: 25px; border: 1px solid #334155; }
        
        .control-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        .control-card { background: var(--card); padding: 25px; border-radius: 20px; text-align: center; border: 1px solid #334155; }
        
        .bet-monitor { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid #334155; min-height: 400px; }
        .bet-row { display: grid; grid-template-columns: 1fr 1fr 1fr; padding: 15px; border-bottom: 1px solid #334155; align-items: center; }
        
        .btn { padding: 15px 30px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; transition: 0.3s; width: 100%; font-size: 16px; margin-top: 10px; }
        .btn-red { background: var(--danger); color: white; }
        .btn-green { background: var(--success); color: white; }
        .btn-auto { background: #64748b; color: white; }
        .active-mode { border: 4px solid var(--white); transform: scale(1.02); box-shadow: 0 0 15px rgba(255,255,255,0.2); }

        .stat-box { display: flex; justify-content: space-around; margin-top: 15px; }
        .stat-item { text-align: center; }
        .stat-item span { display: block; font-size: 12px; color: #94a3b8; }
        .stat-item b { font-size: 20px; }

        .badge { padding: 5px 10px; border-radius: 6px; font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .badge-red { background: rgba(239, 68, 68, 0.2); color: var(--danger); }
        .badge-green { background: rgba(16, 185, 129, 0.2); color: var(--success); }
    </style>
</head>
<body>

<div class="admin-header">
    <div>
        <h2 style="margin:0;">Tiranga Controller</h2>
        <p style="color:#94a3b8; margin:5px 0 0;">Period ID: <span id="currentPeriod">---</span></p>
    </div>
    <div style="text-align: right;">
        <div style="color:var(--danger); font-weight:900; font-size:24px;" id="adminClock">00:00</div>
        <div id="modeStatus" class="badge" style="background:var(--primary); margin-top: 5px; display: inline-block;">MODE: FETCHING...</div>
    </div>
</div>

<div class="control-grid">
    <div class="control-card">
        <h3>Result Control</h3>
        <p style="font-size:12px; color:#94a3b8;">Force next winning color dynamically</p>
        <button class="btn btn-red" id="forceRED" onclick="setMode('RED')">FORCE RED</button>
        <button class="btn btn-green" id="forceGREEN" onclick="setMode('GREEN')">FORCE GREEN</button>
        <button class="btn btn-auto" id="forceAUTO" onclick="setMode('AUTO')">AUTO (ANTI-PROFIT SYSTEM)</button>
    </div>

    <div class="control-card">
        <h3>Live Betting Stats</h3>
        <div class="stat-box">
            <div class="stat-item">
                <span>Total Red Bet</span>
                <b id="totalRedAmt" style="color:var(--danger);">₹0</b>
            </div>
            <div class="stat-item">
                <span>Total Green Bet</span>
                <b id="totalGreenAmt" style="color:var(--success);">₹0</b>
            </div>
        </div>
        <p style="margin-top:20px; font-size:11px; color:#10b981; font-weight: 600; background: rgba(16, 185, 129, 0.1); padding: 8px; border-radius: 8px;">
            💡 Smart Suggestion: <span id="smartSuggestion" style="color:#fff;">Calculating...</span>
        </p>
    </div>
</div>

<div class="bet-monitor">
    <h3 style="padding: 0 20px;">Live User Bets (This Round)</h3>
    <div class="bet-row" style="color:#94a3b8; font-weight:800; border-bottom: 2px solid #334155;">
        <span>User ID</span>
        <span>Selection</span>
        <span>Amount</span>
    </div>
    <div id="betList">
        <p style="text-align:center; color:#64748b; padding:20px;">Waiting for bets...</p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAzfvbiqRqsQwBOOIkegxJD09di-S_tfHg",
        authDomain: "test-eb5e7.firebaseapp.com",
        databaseURL: "https://test-eb5e7-default-rtdb.firebaseio.com",
        projectId: "test-eb5e7",
        appId: "1:366282855653:web:dca7e000f5a22fb11f300c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let periodId = "";
    let previousPeriodId = "";
    let globalRedAmount = 0;
    let globalGreenAmount = 0;

    // 1. Clock & Period Logic (Universal 1-Min Sync)
    setInterval(() => {
        const now = new Date();
        const totalSec = (now.getHours() * 3600) + (now.getMinutes() * 60) + now.getSeconds();
        const rem = 60 - (totalSec % 60);
        const pId = now.toISOString().slice(0,10).replace(/-/g,'') + Math.floor(totalSec / 60);
        
        if(periodId !== pId) {
            previousPeriodId = periodId;
            periodId = pId;
            document.getElementById('currentPeriod').innerText = periodId;
            listenToBets(periodId); // Sync and listen to real-time incoming pool
        }
        const s = rem % 60;
        document.getElementById('adminClock').innerText = `00:${s < 10 ? '0'+s : s}`;

        // Automatically push dynamic result database logs 2 seconds before the round finishes
        if(rem === 2 && periodId) {
            calculateAndPushResult(periodId);
        }
    }, 1000);

    // 2. Real-Time Admin Command Handler
    window.setMode = async (mode) => {
        await set(ref(db, 'admin_control'), mode);
        updateUI(mode);
    };

    function updateUI(mode) {
        document.querySelectorAll('.btn').forEach(b => b.classList.remove('active-mode'));
        if(mode === 'RED') document.getElementById('forceRED').classList.add('active-mode');
        if(mode === 'GREEN') document.getElementById('forceGREEN').classList.add('active-mode');
        if(mode === 'AUTO') document.getElementById('forceAUTO').classList.add('active-mode');
        
        document.getElementById('modeStatus').innerText = "MODE: " + mode;
    }

    // 3. Sync Active Pool Metrics
    function listenToBets(pId) {
        onValue(ref(db, `global_bets/${pId}`), snap => {
            const list = document.getElementById('betList');
            globalRedAmount = 0;
            globalGreenAmount = 0;
            let html = "";

            if(snap.exists()) {
                snap.forEach(child => {
                    const bet = child.val();
                    const userId = child.key.substring(0, 8) + "...";
                    
                    if(bet.choice === 'RED') {
                        globalRedAmount += bet.amount;
                    } else {
                        globalGreenAmount += bet.amount;
                    }

                    html += `
                    <div class="bet-row">
                        <span>${userId}</span>
                        <span><span class="badge ${bet.choice === 'RED' ? 'badge-red' : 'badge-green'}">${bet.choice}</span></span>
                        <b style="color:var(--white)">₹${bet.amount}</b>
                    </div>`;
                });
                list.innerHTML = html;
            } else {
                list.innerHTML = `<p style="text-align:center; color:#64748b; padding:20px;">Waiting for user actions...</p>`;
            }

            document.getElementById('totalRedAmt').innerText = "₹" + globalRedAmount;
            document.getElementById('totalGreenAmt').innerText = "₹" + globalGreenAmount;

            // Generate Smart System Suggestions based on platform volume
            const suggestion = document.getElementById('smartSuggestion');
            if(globalRedAmount === globalGreenAmount) {
                suggestion.innerText = "Equal Pool. Perfect for Pure Random.";
            } else if(globalRedAmount > globalGreenAmount) {
                suggestion.innerText = "Kill RED pool to save ₹" + (globalRedAmount - globalGreenAmount) + " (Give GREEN)";
            } else {
                suggestion.innerText = "Kill GREEN pool to save ₹" + (globalGreenAmount - globalRedAmount) + " (Give RED)";
            }
        });
    }

    // 4. Autonomous Intelligent Fail-safe Result Architecture
    async function calculateAndPushResult(targetPeriod) {
        const resRef = ref(db, `results_1min/${targetPeriod}`);
        const snap = await get(resRef);
        
        // If results haven't been declared yet, parse admin overrides or auto-calculate pool margins
        if(!snap.exists()) {
            const adminSnap = await get(ref(db, 'admin_control'));
            let currentMode = adminSnap.exists() ? adminSnap.val() : "AUTO";
            let determinedColor = "RED";

            if(currentMode === "AUTO") {
                if(globalRedAmount > globalGreenAmount) {
                    determinedColor = "GREEN"; // Force green to maximize platform profit margin
                } else if (globalGreenAmount > globalRedAmount) {
                    determinedColor = "RED";   // Force red to minimize loss
                } else {
                    determinedColor = Math.random() < 0.5 ? "RED" : "GREEN"; // Balance probability split
                }
            } else {
                determinedColor = currentMode; // Override with chosen colors
            }

            // Secure the transaction log node
            await set(resRef, { color: determinedColor });
        }
    }

    // Initialize Active Core Control Mode
    get(ref(db, 'admin_control')).then(s => {
        if(s.exists()) updateUI(s.val());
        else updateUI("AUTO");
    });

</script>
</body>
</html>
