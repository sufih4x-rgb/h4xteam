<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aviator Elite | Pro Sync</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --red: #ea1d39; --green: #2ecc71; --gold: #f1c40f; --card: #12141d; }
        body { background: #05070a; color: white; font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; touch-action: manipulation; }
        
        .header { padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; background: var(--card); border-bottom: 1px solid #1f222e; }
        .bal { color: var(--gold); font-weight: 900; border: 1.5px solid var(--gold); padding: 4px 12px; border-radius: 50px; font-size: 14px; }

        .game-zone { height: 320px; position: relative; background: radial-gradient(circle at bottom left, #2a080c, #05070a); overflow: hidden; border-bottom: 2px solid #1f222e; display: flex; justify-content: center; align-items: center; }
        #multiplier { font-size: 60px; font-weight: 900; z-index: 10; transition: color 0.2s; }
        #plane { position: absolute; width: 75px; z-index: 5; transition: left 0.2s linear, bottom 0.2s linear, transform 0.5s ease; display: none; transform: scaleX(-1); }
        .crashed { transform: scaleX(-1) rotate(65deg) translateY(600px) !important; opacity: 0; transition: all 0.8s ease-in !important; }

        .bet-loader { text-align: center; z-index: 20; position: absolute; }
        .timer-circ { width: 80px; height: 80px; border: 4px solid var(--green); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; font-weight: 900; color: var(--green); margin: 0 auto 10px; }

        .controls { padding: 20px; background: var(--card); border-radius: 25px 25px 0 0; box-shadow: 0 -10px 30px rgba(0,0,0,0.5); }
        .amt-input { width: 100%; background: #000; border: 1.5px solid #333; padding: 12px; border-radius: 10px; color: #fff; font-size: 22px; font-weight: 900; text-align: center; margin-bottom: 10px; outline: none; box-sizing: border-box; }
        
        /* Auto Exit Toggle */
        .auto-box { display: flex; justify-content: space-between; align-items: center; background: #000; padding: 10px 15px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #2d313f; }
        .switch { position: relative; display: inline-block; width: 44px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--green); }
        input:checked + .slider:before { transform: translateX(22px); }

        .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: 900; font-size: 18px; cursor: pointer; text-transform: uppercase; transition: transform 0.1s; }
        .btn:active { transform: scale(0.98); }
        .btn-bet { background: var(--green); color: white; box-shadow: 0 4px 0 #15803d; }
        .btn-cash { background: var(--gold); color: #000; box-shadow: 0 4px 0 #a16207; display: none; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; box-shadow: none; }
        
        #msg { text-align: center; font-size: 12px; margin-top: 10px; color: #64748b; font-weight: 700; height: 15px; }
    </style>
</head>
<body>

<div class="header">
    <div style="font-weight: 900; cursor: pointer;" onclick="handleBack()">⬅ EXIT</div>
    <div class="bal">₹<span id="uBal">0.00</span></div>
</div>

<div class="game-zone">
    <div id="betUI" class="bet-loader" style="display:none;">
        <div class="timer-circ" id="count">10</div>
        <div style="font-size: 10px; font-weight: 800; color: var(--green); letter-spacing: 1px;">BETTING PHASE</div>
    </div>
    <div id="multiplier" style="display:none;">1.00x</div>
    <img id="plane" src="https://i.ibb.co/Y7XvX0k/plane.png">
</div>

<div class="controls">
    <input type="number" class="amt-input" id="amt" value="100" min="10">
    
    <div class="auto-box">
        <span style="font-size: 13px; font-weight: 800;">AUTO CASH OUT (2.0x)</span>
        <label class="switch">
            <input type="checkbox" id="autoToggle">
            <span class="slider"></span>
        </label>
    </div>

    <button id="bBtn" class="btn btn-bet" onclick="placeBet()">PLACE BET</button>
    <button id="cBtn" class="btn btn-cash" onclick="cashOut()">CASH OUT</button>
    <div id="msg">Connecting to ecosystem server...</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, update, increment, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = { apiKey: "AIzaSyAzfvbiqRqsQwBOOIkegxJD09di-S_tfHg", authDomain: "test-eb5e7.firebaseapp.com", databaseURL: "https://test-eb5e7-default-rtdb.firebaseio.com", projectId: "test-eb5e7", appId: "1:366282855653:web:dca7e000f5a22fb11f300c" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    let uid, balance = 0, myBet = 0, hasBet = false, isCashed = false, currentX = 1.0;
    let localCurrentPeriod = 0, clientProcessingState = false;

    onAuthStateChanged(auth, u => {
        if(!u) return;
        uid = u.uid;
        
        // Centralized structural balance tracker mapping
        onValue(ref(db, `user_wallet/${uid}/balance`), s => {
            if(s.exists()){
                balance = parseFloat(s.val()) || 0;
                document.getElementById("uBal").innerText = balance.toFixed(2);
            }
        });
        
        syncGlobalEcosystem();
    });

    // DISTRIBUTED REALTIME INFINITE TIME LOOP PARSER ENGINE
    function syncGlobalEcosystem() {
        onValue(ref(db, ".info/serverTimeOffset"), offsetSnap => {
            const offset = offsetSnap.val() || 0;
            
            setInterval(() => {
                const serverTime = Date.now() + offset;
                const totalSeconds = Math.floor(serverTime / 1000);
                const loopIndex = totalSeconds % 35; // 35 seconds absolute full uniform cycle
                const periodId = Math.floor(totalSeconds / 35);

                if (localCurrentPeriod !== periodId) {
                    localCurrentPeriod = periodId;
                    clientProcessingState = false;
                    resetRoundState();
                }

                const betUI = document.getElementById("betUI");
                const mText = document.getElementById("multiplier");
                const plane = document.getElementById("plane");
                const bBtn = document.getElementById("bBtn");
                const cBtn = document.getElementById("cBtn");
                const msg = document.getElementById("msg");

                // Checking force crash state from database sync pool
                onValue(ref(db, `aviator_sync/state`), stateSnap => {
                    if (stateSnap.exists() && stateSnap.val() === "CRASHED" && loopIndex >= 10 && loopIndex < 32) {
                        if (!clientProcessingState) {
                            clientProcessingState = true;
                            executeServerlessCrash();
                        }
                    }
                }, { onlyOnce: true });

                if (clientProcessingState) return;

                if (loopIndex < 10) {
                    // Phase A: Shared Live Betting Phase (10 Seconds)
                    betUI.style.display = "block";
                    document.getElementById("count").innerText = (10 - loopIndex);
                    mText.style.display = "none";
                    plane.style.display = "none";
                    plane.classList.remove("crashed");
                    
                    if(!hasBet) {
                        bBtn.style.display = "block";
                        bBtn.innerText = "PLACE BET";
                        bBtn.disabled = false;
                    }
                    cBtn.style.display = "none";
                } 
                else if (loopIndex >= 10 && loopIndex < 32) {
                    // Phase B: Live Continuous Mathematical Flight (22 Seconds)
                    betUI.style.display = "none";
                    mText.style.display = "block";
                    mText.style.color = "#ffffff";
                    plane.style.display = "block";

                    // Calculate curve factor values
                    let timeFactor = (loopIndex - 10); 
                    
                    // Controlled trajectory scale vector matrix calculation
                    currentX = 1.0 + (Math.pow(timeFactor, 2) * 0.015);
                    mText.innerText = currentX.toFixed(2) + "x";

                    // Absolute smooth visual plot parameters positioning 
                    plane.style.left = Math.min(78, 12 + (timeFactor * 3.2)) + "%";
                    plane.style.bottom = Math.min(70, 15 + (Math.pow(timeFactor, 1.4) * 2.2)) + "%";

                    if (hasBet && !isCashed) {
                        bBtn.style.display = "none";
                        cBtn.style.display = "block";
                        cBtn.innerText = `CASH OUT ₹${(myBet * currentX).toFixed(2)}`;

                        // Auto Cash Out Trigger Module
                        const isAutoOn = document.getElementById("autoToggle").checked;
                        if (isAutoOn && currentX >= 2.0) {
                            cashOut();
                        }
                    }
                } 
                else {
                    // Phase C: Central Interception Crash Phase (Last 3 Seconds)
                    if (!clientProcessingState) {
                        clientProcessingState = true;
                        executeServerlessCrash();
                    }
                }
            }, 250); // Fast cycle rate check optimization for visual smoothness
        });
    }

    function executeServerlessCrash() {
        const mText = document.getElementById("multiplier");
        const plane = document.getElementById("plane");
        const bBtn = document.getElementById("bBtn");
        const cBtn = document.getElementById("cBtn");
        const msg = document.getElementById("msg");

        mText.innerText = "FLEW AWAY!";
        mText.style.color = "#ea1d39"; // Fixed broken var parameter reference assignment
        plane.classList.add("crashed");

        if (hasBet && !isCashed) {
            msg.innerText = "LOST ₹" + myBet.toFixed(2);
            // Log raw payload matrix to analytics telemetry data path
            trackAdminEcosystemMetrics(myBet, 0, false);
        }
        
        hasBet = false;
        bBtn.disabled = true;
        bBtn.style.display = "block";
        bBtn.innerText = "PLACE BET";
        cBtn.style.display = "none";
    }

    window.placeBet = async () => {
        const amtInput = document.getElementById("amt");
        const amt = parseFloat(amtInput.value);
        if(amt > balance || amt < 10 || isNaN(amt)) return alert("Check Wallet Balance!");
        
        await update(ref(db, `user_wallet/${uid}`), { balance: increment(-amt) });
        myBet = amt; hasBet = true; isCashed = false;
        
        const bBtn = document.getElementById("bBtn");
        bBtn.innerText = "BET PLACED";
        bBtn.disabled = true;
        document.getElementById("msg").innerText = "Waiting for flight takeoff...";
    };

    window.cashOut = async () => {
        if(!hasBet || isCashed) return;
        isCashed = true;
        const winAmount = myBet * currentX;
        
        await update(ref(db, `user_wallet/${uid}`), { balance: increment(winAmount) });
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.8 } });
        
        document.getElementById("cBtn").style.display = "none";
        const bBtn = document.getElementById("bBtn");
        bBtn.style.display = "block";
        bBtn.innerText = "WIN ₹" + winAmount.toFixed(2);
        document.getElementById("msg").innerText = "Success! Earnings safely distributed.";

        // Transmit secure tracking logs to backend operational registers
        trackAdminEcosystemMetrics(myBet, winAmount, true);
    };

    async function trackAdminEcosystemMetrics(investment, returnAmt, isVictory) {
        let systemNetProfit = investment - returnAmt;
        let todayStamp = new Date().toISOString().split('T')[0];

        // Safely increment absolute values onto shared administrative dashboards
        await update(ref(db, `aviator_admin_ledger/stats`), {
            totalSystemProfit: increment(systemNetProfit),
            totalUsersPaidOut: increment(returnAmt)
        });

        await update(ref(db, `aviator_admin_ledger/daily/${todayStamp}`), {
            investmentVolume: increment(investment),
            payoutVolume: increment(returnAmt)
        });
    }

    function resetRoundState() {
        isCashed = false;
        document.getElementById("msg").innerText = "Awaiting transaction logs...";
    }

    window.handleBack = async () => {
        if(hasBet && !isCashed && currentX > 1.0) {
            await cashOut();
        }
        window.history.back();
    };

    window.addEventListener('popstate', handleBack);
</script>
</body>
</html>
