<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel | DOT GAMES</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; padding: 20px; }
        .card { background: #1e293b; padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #334155; }
        .stock { font-size: 24px; font-weight: 800; color: #4361ee; }
        .req { background: #111827; padding: 15px; border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; }
        button { cursor: pointer; padding: 10px; border-radius: 5px; border: none; font-weight: bold; }
        input { padding: 10px; width: 100%; margin: 5px 0; border-radius: 5px; border: none; }
    </style>
</head>
<body>
    <div class="card">
        <h2>MY STOCK: <span id="stk" class="stock">₹0.00</span></h2>
        <hr>
        <h4>Buy Stock from Super Admin</h4>
        <input type="number" id="bAmt" placeholder="Amount" oninput="genSupQR()">
        <div id="sqr"></div>
        <input type="text" id="aUtr" placeholder="Enter UTR">
        <button onclick="reqStk()" style="background:orange; width:100%;">BUY STOCK</button>
    </div>

    <h3>Pending User Requests</h3>
    <div id="uList"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, update, increment, get, push, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = { /* SAME CONFIG */ };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const AID = "admin_01";
    let SUPI = "";

    onValue(ref(db, "super_settings/upi"), s => { SUPI = s.val(); });
    onValue(ref(db, `admins/${AID}/stock`), s => { document.getElementById('stk').innerText = "₹" + (s.val() || 0).toFixed(2); });

    onValue(ref(db, "deposit_requests"), s => {
        let h = "";
        s.forEach(c => {
            const d = c.val();
            if(d.status === "pending") h += `<div class="req"><span>₹${d.amount} | ${d.email}</span><button onclick="appr('${c.key}','${d.uid}',${d.amount})" style="background:green; color:white;">APPROVE</button></div>`;
        });
        document.getElementById('uList').innerHTML = h;
    });

    window.genSupQR = () => {
        const a = document.getElementById('bAmt').value;
        if(a > 0 && SUPI) document.getElementById('sqr').innerHTML = `<img src="https://api.qrserver.com/v1/create-qr-code/?data=${encodeURIComponent('upi://pay?pa='+SUPI+'&am='+a)}" width="150">`;
    };

    window.appr = async (rid, uid, amt) => {
        const s = await get(ref(db, `admins/${AID}/stock`));
        if((s.val() || 0) < amt) return alert("Low Stock!");
        await update(ref(db, `admins/${AID}`), { stock: increment(-amt) });
        await update(ref(db, `users/${uid}`), { balance: increment(amt) });
        await update(ref(db, `deposit_requests/${rid}`), { status: "approved" });
        alert("Approved!");
    };

    window.reqStk = () => {
        push(ref(db, "super_requests"), { adminId: AID, amount: parseFloat(document.getElementById('bAmt').value), utr: document.getElementById('aUtr').value, status: "pending", time: serverTimestamp() });
        alert("Sent!");
    };
</script>
</body>
</html>
