<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard | DOT GAMES</title>
    <style>
        :root { --gold: #d4af37; --sky: #00d2ff; }
        body { background: #f4f7f9; font-family: sans-serif; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 20px; border: 1px solid #eee; margin-bottom: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.02); }
        .stk-box { font-size: 32px; font-weight: 900; color: var(--gold); }
        input { padding: 12px; width: 280px; border: 2px solid #f0f0f0; border-radius: 10px; outline: none; }
        .btn-sky { background: var(--sky); color: white; border: none; padding: 12px 25px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .req-card { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #eee; }
        #sqr img { border: 3px solid var(--sky); margin: 10px; border-radius: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="margin:0">ADMIN STOCK</h2>
    <div class="stk-box" id="stkDisplay">₹0.00</div>
    <div style="margin-top:15px;">
        <input type="text" id="myUpi" placeholder="Update Your UPI for Users">
        <button class="btn-sky" onclick="updateUpi()">SAVE UPI</button>
    </div>
</div>

<div class="card">
    <h3>Buy Stock (Super Admin QR)</h3>
    <input type="number" id="bAmt" placeholder="Amount to Refill" oninput="genQR()">
    <div id="sqr"></div>
    <input type="text" id="sUtr" placeholder="Enter 12-Digit UTR">
    <button class="btn-sky" style="background:var(--gold)" onclick="buyStk()">SEND REFILL REQUEST</button>
</div>

<div class="card">
    <h3>User Requests</h3>
    <div id="uList"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, update, increment, get, push, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    const firebaseConfig = { /* SAME CONFIG */ };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const AID = "admin_01";
    let SUPER_UPI = "";

    onValue(ref(db, "super_settings/upi"), s => { SUPER_UPI = s.val(); });
    onValue(ref(db, `admins/${AID}/stock`), s => { document.getElementById('stkDisplay').innerText = "₹" + (s.val() || 0); });
    window.updateUpi = () => { update(ref(db, "admin_settings/upi"), { id: document.getElementById('myUpi').value }); alert("User UPI Updated!"); };

    window.genQR = () => {
        const a = document.getElementById('bAmt').value;
        if(a > 0 && SUPER_UPI) document.getElementById('sqr').innerHTML = `<img src="https://api.qrserver.com/v1/create-qr-code/?data=${encodeURIComponent('upi://pay?pa='+SUPER_UPI+'&am='+a)}">`;
    };

    onValue(ref(db, "deposit_requests"), s => {
        let h = "";
        s.forEach(c => {
            const d = c.val();
            if(d.status === "pending") h += `<div class="req-card"><span><b>₹${d.amount}</b> (${d.utr})</span> 
            <div><button class="btn-sky" style="background:#2ecc71" onclick="action('${c.key}','${d.uid}',${d.amount},'approved')">Approve</button>
            <button class="btn-sky" style="background:#e74c3c" onclick="action('${c.key}','${d.uid}',${d.amount},'rejected')">Reject</button></div></div>`;
        });
        document.getElementById('uList').innerHTML = h || "No pending requests";
    });

    window.action = async (rid, uid, amt, stat) => {
        if(stat === 'approved') {
            const s = await get(ref(db, `admins/${AID}/stock`));
            if((s.val() || 0) < amt) return alert("Low Stock Balance!");
            await update(ref(db, `admins/${AID}`), { stock: increment(-amt) });
            await update(ref(db, `users/${uid}`), { balance: increment(amt) });
        } else {
            const res = prompt("Rejection Reason?");
            await update(ref(db, `deposit_requests/${rid}`), { reason: res });
        }
        update(ref(db, `deposit_requests/${rid}`), { status: stat });
    };

    window.buyStk = () => { push(ref(db, "super_requests"), { adminId: AID, amount: parseFloat(document.getElementById('bAmt').value), utr: document.getElementById('sUtr').value, status: "pending", time: serverTimestamp() }); alert("Refill request sent!"); };
</script>
</body>
</html>
