<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard | Luxury Royale</title>
    <style>
        :root { --gold: #d4af37; --sky: #00d2ff; }
        body { background: #fdfdfd; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 20px; border: 1px solid #eee; margin-bottom: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .stk-txt { font-size: 35px; font-weight: 900; color: var(--gold); }
        input { padding: 12px; width: 260px; border-radius: 12px; border: 2px solid #f0f0f0; outline: none; font-weight: 600; transition: 0.3s; }
        input:focus { border-color: var(--sky); }
        .btn-sky { background: var(--sky); color: white; border: none; padding: 12px 20px; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-sky:hover { transform: translateY(-2px); opacity: 0.9; }
        
        /* Request Box Styles */
        .req-box { border: 1px solid #f0f0f0; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-radius: 15px; margin-bottom: 10px; background: #fff; }
        .req-info b { color: var(--gold); font-size: 18px; }
        .req-info small { color: #888; display: block; margin-top: 4px; }
        .action-btns { display: flex; gap: 8px; }
        .approve-btn { background: #2ecc71; color: white; border: none; padding: 10px 15px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .cancel-btn { background: #e74c3c; color: white; border: none; padding: 10px 15px; border-radius: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="margin-top:0;">MY STOCK: <span id="stkVal" class="stk-txt">₹0</span></h2>
    <div style="display: flex; gap: 10px; align-items: center;">
        <input type="text" id="newUpi" placeholder="example@ybl">
        <button class="btn-sky" onclick="saveAdminUpi()">UPDATE UPI</button>
    </div>
</div>

<div class="card">
    <h3>Buy Stock (Super Admin QR)</h3>
    <input type="number" id="buyAmt" placeholder="Enter Amount" oninput="genSuperQR()">
    <div id="sqrContainer" style="margin:15px 0;"></div>
    <div style="display: flex; gap: 10px; align-items: center;">
        <input type="text" id="adminUtr" placeholder="Enter Your UTR">
        <button class="btn-sky" style="background:var(--gold)" onclick="reqStock()">REQUEST REFILL</button>
    </div>
</div>

<div class="card">
    <h3 style="color: #333; border-bottom: 2px solid #f0f0f0; padding-bottom: 10px;">User Deposit Requests</h3>
    <div id="uReqList"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, update, increment, push, serverTimestamp, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyAzfvbiqRqsQwBOOIkegxJD09di-S_tfHg", 
        authDomain: "test-eb5e7.firebaseapp.com", 
        databaseURL: "https://test-eb5e7-default-rtdb.firebaseio.com", 
        projectId: "test-eb5e7", 
        appId: "1:366282855653:web:dca7e000f5a22fb11f300c" 
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let SUPER_UPI = "";
    const AID = "admin_01";

    onValue(ref(db, "settings/super_upi"), s => { SUPER_UPI = s.val(); });
    onValue(ref(db, `admins/${AID}/stock`), s => { document.getElementById('stkVal').innerText = "₹" + (s.val() || 0); });

    window.saveAdminUpi = () => {
        const upiValue = document.getElementById('newUpi').value;
        if(!upiValue.includes('@')) return alert("Please enter a valid UPI ID");
        update(ref(db, "settings"), { admin_upi: upiValue });
        alert("Admin UPI Updated Successfully!");
    };

    window.genSuperQR = () => {
        const a = document.getElementById('buyAmt').value;
        if(a > 0 && SUPER_UPI) {
            document.getElementById('sqrContainer').innerHTML = `<img src="https://api.qrserver.com/v1/create-qr-code/?data=${encodeURIComponent('upi://pay?pa='+SUPER_UPI+'&am='+a+'&cu=INR')}" width="180" style="border: 4px solid var(--gold); border-radius: 15px; padding: 5px;">`;
        } else {
            document.getElementById('sqrContainer').innerHTML = "";
        }
    };

    window.reqStock = () => {
        const amt = parseFloat(document.getElementById('buyAmt').value);
        const utr = document.getElementById('adminUtr').value;
        if(!amt || utr.length < 10) return alert("Please enter valid Amount and UTR");
        push(ref(db, "stock_requests"), { adminId: AID, amount: amt, utr: utr, status: "pending", time: serverTimestamp() });
        alert("Refill Request Sent!");
    };

    // FIX: Show Phone, UTR and Handle Cancel safely
    onValue(ref(db, "user_requests"), s => {
        let h = "";
        s.forEach(c => {
            const d = c.val();
            if(d.status === "pending") {
                h += `
                <div class="req-box">
                    <div class="req-info">
                        <b>₹${d.amount}</b>
                        <small>Phone: <span style="color:var(--sky)">${d.phone || 'N/A'}</span></small>
                        <small>UTR: ${d.utr}</small>
                    </div>
                    <div class="action-btns">
                        <button class="approve-btn" onclick="approveUser('${c.key}','${d.uid}',${d.amount})">Approve</button>
                        <button class="cancel-btn" onclick="cancelUser('${c.key}')">Cancel</button>
                    </div>
                </div>`;
            }
        });
        document.getElementById('uReqList').innerHTML = h || "<p style='color:#ccc; text-align:center;'>No pending user requests</p>";
    });

    window.approveUser = async (rid, uid, amt) => {
        const s = await get(ref(db, `admins/${AID}/stock`));
        if((s.val() || 0) < amt) return alert("Low Stock!");
        
        if(confirm("Approve this deposit?")) {
            await update(ref(db, `admins/${AID}`), { stock: increment(-amt) });
            await update(ref(db, `user_wallet/${uid}`), { balance: increment(amt) });
            await update(ref(db, `user_requests/${rid}`), { status: "approved" });
            alert("Balance Added!");
        }
    };

    // FIX: Only update request status, do not touch wallet balance
    window.cancelUser = async (rid) => {
        const reason = prompt("Enter rejection reason:");
        if(confirm("Reject this order? (User's existing balance won't be affected)")) {
            await update(ref(db, `user_requests/${rid}`), { 
                status: "rejected", 
                reason: reason || "Invalid Payment Details" 
            });
            alert("Deposit Cancelled!");
        }
    };
</script>
</body>
</html>
