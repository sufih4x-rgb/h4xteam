<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Panel</title>

<style>

:root{
    --blue:#2563eb;
    --green:#22c55e;
    --red:#ef4444;
    --white:#ffffff;
    --gray:#6b7280;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:linear-gradient(135deg,#eff6ff,#f8fafc);
    padding:20px;
}

.container{
    max-width:500px;
    margin:auto;
}

.card{
    background:white;
    border-radius:25px;
    padding:20px;
    margin-bottom:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

h2{
    text-align:center;
    margin-bottom:20px;
    font-size:28px;
    font-weight:800;
    color:#111827;
}

h3{
    margin-bottom:15px;
    color:#111827;
}

input, textarea{
    width:100%;
    padding:15px;
    border-radius:14px;
    border:2px solid #e5e7eb;
    margin-top:12px;
    outline:none;
    font-size:15px;
}

input:focus,
textarea:focus{
    border-color:var(--blue);
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:14px;
    color:white;
    font-size:15px;
    font-weight:800;
    cursor:pointer;
    margin-top:12px;
}

.saveBtn{
    background:var(--blue);
}

.acceptBtn{
    background:var(--green);
}

.rejectBtn{
    background:var(--red);
}

.req{
    border:1px solid #eee;
    border-radius:20px;
    padding:15px;
    margin-bottom:15px;
    background:#fff;
}

.row{
    display:flex;
    justify-content:space-between;
    margin-bottom:10px;
    gap:10px;
}

.label{
    color:var(--gray);
    font-size:13px;
}

.value{
    font-weight:700;
    color:#111827;
    word-break:break-word;
}

.status{
    margin-top:10px;
    background:#f3f4f6;
    padding:10px;
    border-radius:10px;
    font-size:13px;
    font-weight:700;
}

.empty{
    text-align:center;
    color:#9ca3af;
    padding:20px;
}

</style>
</head>

<body>

<div class="container">

<!-- SETTINGS -->
<div class="card">

<h2>Admin Panel</h2>

<h3>Payment Settings</h3>

<input type="text" id="upi" placeholder="Enter Admin UPI">

<input type="number" id="minAmt" placeholder="Minimum Amount">

<input type="number" id="maxAmt" placeholder="Maximum Amount">

<button class="saveBtn" onclick="saveSettings()">
SAVE SETTINGS
</button>

</div>

<!-- REQUESTS -->
<div class="card">

<h3>Deposit Requests</h3>

<div id="requests"></div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {

getDatabase,
ref,
onValue,
set,
update,
get

} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";



// =======================
// FIREBASE CONFIG
// =======================

const firebaseConfig = {

apiKey: "AIzaSyAzfvbiqRqsQwBOOIkegxJD09di-S_tfHg",

authDomain: "test-eb5e7.firebaseapp.com",

databaseURL: "https://test-eb5e7-default-rtdb.firebaseio.com",

projectId: "test-eb5e7",

storageBucket: "test-eb5e7.appspot.com",

messagingSenderId: "366282855653",

appId: "1:366282855653:web:dca7e000f5a22fb11f300c",

measurementId: "G-ECKCTBLQJ8"

};



// =======================
// INIT
// =======================

const app = initializeApp(firebaseConfig);

const db = getDatabase(app);



// =======================
// LOAD SETTINGS
// =======================

onValue(ref(db,"settings"),(snap)=>{

if(snap.exists()){

const d = snap.val();

document.getElementById('upi').value =
d.admin_upi || "";

document.getElementById('minAmt').value =
d.min_amount || 100;

document.getElementById('maxAmt').value =
d.max_amount || 50000;

}

});



// =======================
// SAVE SETTINGS
// =======================

window.saveSettings = () => {

const upi =
document.getElementById('upi').value;

const min =
parseInt(document.getElementById('minAmt').value);

const max =
parseInt(document.getElementById('maxAmt').value);

if(!upi){

return alert("Enter UPI");

}

if(min >= max){

return alert("Minimum should be smaller");

}

set(ref(db,"settings"),{

admin_upi:upi,
min_amount:min,
max_amount:max

}).then(()=>{

alert("Settings Saved");

});

};



// =======================
// LOAD REQUESTS
// =======================

onValue(ref(db,"user_requests"),(snap)=>{

let html = "";

snap.forEach(c=>{

const d = c.val();

const id = c.key;

const date =
new Date(d.time || Date.now())
.toLocaleString();

html = `

<div class="req">

<div class="row">
<div class="label">Amount</div>
<div class="value">₹${d.amount}</div>
</div>

<div class="row">
<div class="label">UTR</div>
<div class="value">${d.utr}</div>
</div>

<div class="row">
<div class="label">Email</div>
<div class="value">${d.email}</div>
</div>

<div class="row">
<div class="label">Phone</div>
<div class="value">${d.phone}</div>
</div>

<div class="row">
<div class="label">Date</div>
<div class="value">${date}</div>
</div>

<div class="status">
Status: ${d.status.toUpperCase()}
</div>

<textarea
id="reason_${id}"
placeholder="Reject reason"
></textarea>

<button
class="acceptBtn"
onclick="approveRequest('${id}')"
>
ACCEPT
</button>

<button
class="rejectBtn"
onclick="rejectRequest('${id}')"
>
REJECT
</button>

</div>

` + html;

});

document.getElementById('requests').innerHTML =
html || `<div class="empty">No Requests</div>`;

});



// =======================
// APPROVE PAYMENT
// =======================

window.approveRequest = async (id) => {

try{

const requestRef =
ref(db, `user_requests/${id}`);

const snap =
await get(requestRef);

if(!snap.exists()){

return alert("Request not found");

}

const data = snap.val();

if(data.status === "approved"){

return alert("Already Approved");

}

const uid = data.uid;

const amount =
Number(data.amount || 0);



// USER BALANCE REF
const balanceRef =
ref(db, `users/${uid}/balance`);

const balanceSnap =
await get(balanceRef);

let currentBalance = 0;

if(balanceSnap.exists()){

currentBalance =
Number(balanceSnap.val());

}

const newBalance =
currentBalance + amount;



// UPDATE BALANCE
await set(balanceRef, newBalance);



// UPDATE REQUEST STATUS
await update(requestRef, {

status:"approved",
notice:""

});

alert("Payment Approved & Balance Added");

}catch(err){

console.log(err);

alert("Error");

}

};



// =======================
// REJECT PAYMENT
// =======================

window.rejectRequest = async (id) => {

const reason =
document.getElementById(`reason_${id}`).value;

if(!reason){

return alert("Enter reject reason");

}

await update(ref(db,`user_requests/${id}`),{

status:"rejected",
notice:reason

});

alert("Payment Rejected");

};

</script>

</body>
</html>
