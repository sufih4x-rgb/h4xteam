<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vortex Control Panel | ADMIN</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4361ee; --dark-bg: #0f172a; --panel-bg: #1e293b; --success: #06d6a0; --danger: #ef476f; }
        body { background: var(--dark-bg); color: #f8fafc; font-family: 'Inter', sans-serif; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .admin-shell { width: 100%; max-width: 500px; background: var(--panel-bg); border-radius: 24px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); box-sizing: border-box; }
        h2 { font-size: 20px; font-weight: 800; margin-top: 0; text-align: center; color: var(--primary); }
        .metric-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); padding: 15px; border-radius: 16px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .metric-val { font-size: 18px; font-weight: 800; }
        .profit { color: var(--success); }
        .pool-box { background: #0f172a; padding: 12px; border-radius: 12px; font-size: 12px; font-weight: 600; margin-top: 10px; display: flex; justify-content: space-between; }
        .admin-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 20px; }
        .btn-cmd { padding: 14px; border-radius: 14px; border: none; font-size: 12px; font-weight: 800; cursor: pointer; color: white; background: rgba(255,255,255,0.05); transition: 0.2s; }
        .btn-cmd.active { background: var(--primary); box-shadow: 0 0 15px var(--primary); }
        .status-bar { text-align: center; font-size: 12px; color: #94a3b8; margin-top: 15px; font-weight: 600; }
    </style>
</head>
<body>

<div class="admin-shell">
    <h2>VORTEX LIVE CONTROL CENTER</h2>
    
    <!-- House Profit Calculations Realtime Analytics -->
    <div class="metric-card">
        <div>
            <div style="font-size:10px; opacity:0.6; font-weight:700;">TOTAL NET HOUSE PROFIT</div>
            <div class="metric-val profit" id="lblNetProfit">₹0.00</div>
        </div>
        <div style="text-align: right;">
            <div style="font-size:10px; opacity:0.6; font-weight:700;">TOTAL INFLOW</div>
            <div class="metric-val" id="lblTotalInflow" style="font-size:14px;">₹0.00</div>
        </div>
    </div>

    <!-- Active Live Pooling Monitor Frame -->
    <div style="font-size:11px; font-weight:800; opacity:0.7; margin-bottom:5px;">CURRENT LIVE ROOM POOLS:</div>
    <div class="pool-box" style="border-left: 4px solid var(--danger);"><span>🔥 FIRE POOL (3.9x):</span><span id="poolFIRE">₹0</span></div>
    <div class="pool-box" style="border-left: 4px solid #0284c7;"><span>💧 WATER POOL (2.5x):</span><span id="poolWATER">₹0</span></div>
    <div class="pool-box" style="border-left: 4px solid var(--success);"><span>🟢 EARTH POOL (1.55x):</span><span id="poolEARTH">₹0</span></div>

    <!-- Manipulation Engine Signal Triggers -->
    <div style="font-size:11px; font-weight:800; opacity:0.7; margin-top:25px; margin-bottom:5px;">FORCE OVERRIDE OUTCOME:</div>
    <div class="admin-grid">
        <button class="btn-cmd" id="cmd_AUTO" onclick="setSignal('AUTO')">🤖 AUTO PROFIT MODE</button>
        <button class="btn-cmd" id="cmd_FORCE_FIRE" onclick="setSignal('FORCE_FIRE')">🔥 FORCE FIRE</button>
        <button class="btn-cmd" id="cmd_FORCE_WATER" onclick="setSignal('FORCE_WATER')">💧 FORCE WATER</button>
        <button class="btn-cmd" id="cmd_FORCE_EARTH" onclick="setSignal('FORCE_EARTH')">🟢 FORCE EARTH</button>
    </div>

    <div class="status-bar" id="lblAdminStatus">Period ID Tracking: Active</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = { apiKey: "AIzaSyAzfvbiqRqsQwBOOIkegxJD09di-S_tfHg", authDomain: "test-eb5e7.firebaseapp.com", databaseURL: "https://test-eb5e7-default-rtdb.firebaseio.com", projectId: "test-eb5e7", appId: "1:366282855653:web:dca7e000f5a22fb11f300c" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // 1. Live House Analytics Tracker
    onValue(ref(db, 'vortex_analytics'), (snap) => {
        if(snap.exists()){
            let data = snap.val();
            document.getElementById('lblNetProfit').innerText = "₹" + parseFloat(data.netHouseProfit || 0).toFixed(2);
            document.getElementById('lblTotalInflow').innerText = "₹" + parseFloat(data.totalInflow || 0).toFixed(2);
        }
    });

    // 2. Active Session Realtime Pool Stream
    onValue(ref(db, 'vortex_current_state'), (stateSnap) => {
        if(stateSnap.exists()){
            let cur = stateSnap.val();
            document.getElementById('lblAdminStatus').innerText = "Active Period: " + cur.periodId;
            
            onValue(ref(db, `vortex_live_pools/${cur.periodId}`), (poolSnap) => {
                if(poolSnap.exists()){
                    let p = poolSnap.val();
                    document.getElementById('poolFIRE').innerText = "₹" + (p.FIRE?.totalAmount || 0);
                    document.getElementById('poolWATER').innerText = "₹" + (p.WATER?.totalAmount || 0);
                    document.getElementById('poolEARTH').innerText = "₹" + (p.EARTH?.totalAmount || 0);
                } else {
                    document.getElementById('poolFIRE').innerText = "₹0";
                    document.getElementById('poolWATER').innerText = "₹0";
                    document.getElementById('poolEARTH').innerText = "₹0";
                }
            });
        }
    });

    // 3. Command Signal Trigger Triggers
    window.setSignal = async (type) => {
        await set(ref(db, 'vortex_admin_signal'), type);
    };

    onValue(ref(db, 'vortex_admin_signal'), (snap) => {
        let active = snap.val() || "AUTO";
        document.querySelectorAll('.btn-cmd').forEach(btn => btn.classList.remove('active'));
        if(document.getElementById(`cmd_${active}`)) {
            document.getElementById(`cmd_${active}`).classList.add('active');
        }
    });
</script>
</body>
</html>
