<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safe Withdraw | Tiranga Official</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4361ee; --bg: #f4f7fe; --white: #ffffff; --success: #06d6a0; --danger: #ff4d4d; }
        body { background: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .withdraw-container { width: 100%; max-width: 480px; background: var(--white); padding: 25px; min-height: 90vh; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        
        .balance-card { background: linear-gradient(135deg, #1e293b, #4361ee); color: white; padding: 30px; border-radius: 25px; text-align: center; margin-bottom: 25px; position: relative; overflow: hidden; }
        .balance-card h1 { font-size: 36px; margin: 10px 0 0; font-weight: 800; }

        .input-group { margin-bottom: 20px; }
        label { font-size: 12px; font-weight: 800; color: #64748b; text-transform: uppercase; margin-bottom: 8px; display: block; }
        
        input { width: 100%; padding: 16px; border: 2px solid #f1f5f9; background: #f8fafc; border-radius: 15px; font-size: 16px; font-weight: 700; outline: none; box-sizing: border-box; transition: 0.3s; }
        input:focus { border-color: var(--primary); background: #fff; }

        .btn-withdraw { width: 100%; padding: 20px; background: var(--primary); color: white; border: none; border-radius: 18px; font-size: 16px; font-weight: 800; cursor: pointer; margin-top: 10px; box-shadow: 0 4px 15px rgba(67, 97, 238, 0.3); }
        .btn-withdraw:disabled { background: #cbd5e1; box-shadow: none; cursor: not-allowed; }

        /* History */
        .history-section { margin-top: 35px; border-top: 1px solid #eee; pt: 20px; }
        .history-row { background: #f8fafc; padding: 15px; border-radius: 18px; margin-bottom: 12px; border: 1px solid #f1f5f9; display: flex; justify-content: space-between; align-items: center; }
        .status-pill { padding: 6px 12px; border-radius: 10px; font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .pill-pending { background: #fef3c7; color: #92400e; }
        .pill-approved { background: #d1fae5; color: #065f46; }
        .pill-rejected { background: #fee2e2; color: #991b1b; }

        /* Real-time Notify Popup */
        #notifyOverlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:10000; align-items:center; justify-content:center; padding:20px; box-sizing: border-box; }
        .notify-card { background: white; padding: 40px 20px; border-radius: 30px; text-align: center; width: 100%; max-width: 350px; }
    </style>
</head>
<body>

<div class="withdraw-container">
    <div class="balance-card">
        <small style="opacity: 0.8; font-weight: 600;">Available for Withdrawal</small>
        <h1>₹<span id="balanceText">0.00</span></h1>
    </div>

    <div class="input-group">
        <label>Withdraw Amount (Min ₹100)</label>
        <input id="amount" type="number" placeholder="Enter Amount" oninput="checkInputs()">
    </div>

    <div class="input-group">
        <label>Your UPI ID</label>
        <input id="upi1" type="text" placeholder="e.g. name@upi" oninput="checkInputs()">
    </div>

    <div class="input-group">
        <label>Confirm UPI ID</label>
        <input id="upi2" type="text" placeholder="Re-enter for safety" oninput="checkInputs()">
    </div>

    <button id="withdrawBtn" class="btn-withdraw" onclick="processWithdraw()" disabled>SUBMIT WITHDRAWAL</button>

    <div class="history-section">
        <label style="margin-top: 20px;">Withdrawal Records</label>
        <div id="historyList"></div>
    </div>
</div>

<div id="notifyOverlay">
    <div class="notify-card">
        <h1 id="notifIcon" style="font-size: 60px; margin: 0;">🎉</h1>
        <h2 id="notifTitle" style="margin: 10px 0; color: #1e293b;">Success!</h2>
        <p id="notifMsg" style="color: #64748b; font-weight: 500;"></p>
        <button onclick="closeNotif()" class="btn-withdraw" style="padding: 15px; margin-top: 20px;">GREAT!</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, onValue, update, increment, push, query, orderByChild, equalTo } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAzfvbiqRqsQwBOOIkegxJD09di-S_tfHg",
        authDomain: "test-eb5e7.firebaseapp.com",
        databaseURL: "https://test-eb5e7-default-rtdb.firebaseio.com",
        projectId: "test-eb5e7",
        appId: "1:366282855653:web:dca7e000f5a22fb11f300c"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    let uid = "", userBal = 0, uName = "";

    onAuthStateChanged(auth, user => {
        if (!user) return window.location = "login.html";
        uid = user.uid;
        
        onValue(ref(db, "users/" + uid), snap => {
            if(snap.exists()){
                userBal = snap.val().balance || 0;
                uName = snap.val().displayName || "User";
                document.getElementById("balanceText").innerText = userBal.toFixed(2);
            }
        });

        loadHistoryAndListen();
    });

    // LISTEN FOR ADMIN CHANGES (REAL-TIME)
    function loadHistoryAndListen() {
        const histRef = query(ref(db, "withdrawals"), orderByChild("uid"), equalTo(uid));
        onValue(histRef, snap => {
            let html = "";
            snap.forEach(child => {
                const data = child.val();
                const key = child.key;

                // POPUP ALERT LOGIC
                if(!data.userNotified && data.status !== "Pending") {
                    showBigNotify(data.status, data.amount, data.reason || "", key);
                }

                html = `
                <div class="history-row">
                    <div class="hist-info">
                        <b style="font-size: 15px;">₹${data.amount}</b>
                        <small style="display:block; color:#94a3b8; font-size:11px;">${new Date(data.timestamp).toLocaleDateString()}</small>
                        ${data.reason ? `<span style="color:red; font-size:10px; font-weight:700;">Note: ${data.reason}</span>` : ""}
                    </div>
                    <span class="status-pill pill-${data.status.toLowerCase()}">${data.status}</span>
                </div>` + html;
            });
            document.getElementById("historyList").innerHTML = html || "<p style='text-align:center; color:#94a3b8; font-size:12px; margin-top:20px;'>No records found.</p>";
        });
    }

    function showBigNotify(status, amt, reason, key) {
        const overlay = document.getElementById("notifyOverlay");
        if(status === "Approved") {
            document.getElementById("notifIcon").innerText = "🏆";
            document.getElementById("notifTitle").innerText = "Withdrawal Success!";
            document.getElementById("notifMsg").innerText = `Your request for ₹${amt} has been processed to your UPI. Check your bank!`;
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        } else {
            document.getElementById("notifIcon").innerText = "❌";
            document.getElementById("notifTitle").innerText = "Request Rejected";
            document.getElementById("notifMsg").innerText = `Reason: ${reason || "Policy Violation"}`;
        }
        overlay.style.display = "flex";
        // Mark as seen so popup doesn't repeat
        update(ref(db, `withdrawals/${key}`), { userNotified: true });
    }

    window.closeNotif = () => document.getElementById("notifyOverlay").style.display = "none";

    window.checkInputs = () => {
        const a = document.getElementById("amount").value;
        const u1 = document.getElementById("upi1").value;
        const u2 = document.getElementById("upi2").value;
        document.getElementById("withdrawBtn").disabled = !(a >= 100 && u1 && u1 === u2);
    };

    window.processWithdraw = async () => {
        const amt = Number(document.getElementById("amount").value);
        const upi = document.getElementById("upi1").value;
        
        if(amt > userBal) return alert("Insufficient Balance!");
        
        document.getElementById("withdrawBtn").disabled = true;
        document.getElementById("withdrawBtn").innerText = "Processing...";

        try {
            await update(ref(db, `users/${uid}`), { balance: increment(-amt) });
            await push(ref(db, "withdrawals"), {
                uid: uid,
                displayName: uName,
                amount: amt,
                upiId: upi,
                status: "Pending",
                timestamp: Date.now(),
                userNotified: false
            });
            alert("Withdrawal request submitted!");
            document.getElementById("amount").value = "";
            document.getElementById("withdrawBtn").innerText = "SUBMIT WITHDRAWAL";
        } catch(e) { alert(e.message); }
    };
</script>
</body>
</html>
